# ==============================================================================
# File: ansible/collections/requirements.yml
# Purpose:
#   Ansible collection requirements for homelab automation.
# Notes:
#   - community.routeros provides MikroTik RouterOS modules and plugins.
#   - ansible.netcommon provides the network_cli connection used over SSH.
#   - ansible.posix provides the mount module used for Linux filesystems.
# ==============================================================================

collections:
  - name: ansible.netcommon
  - name: community.routeros
  - name: ansible.posix
