---
# ==============================================================================
# File: ansible/roles/plex_server_config/tasks/service.yml
# Purpose:
#   Ensure Plex Media Server is enabled, running, and initialised before config.
# ==============================================================================

- name: Ensure Plex data directory exists
  ansible.builtin.file:
    path: "{{ plex_server_config_data_dir }}"
    state: directory
    owner: "{{ plex_server_config_user }}"
    group: "{{ plex_server_config_group }}"
    mode: '0755'

- name: Ensure Plex Media Server is enabled and running
  ansible.builtin.systemd_service:
    name: "{{ plex_server_config_service_name }}"
    enabled: true
    state: started

- name: Wait for Plex local API to answer
  ansible.builtin.uri:
    url: "{{ plex_server_config_api_base_url }}/identity"
    method: GET
    status_code:
      - 200
      - 401
      - 403
    timeout: "{{ plex_server_config_api_timeout }}"
  register: plex_server_config_identity_probe
  retries: "{{ plex_server_config_api_retries }}"
  delay: "{{ plex_server_config_api_delay }}"
  until:
    - plex_server_config_identity_probe.status is defined
    - plex_server_config_identity_probe.status in [200, 401, 403]
  changed_when: false
