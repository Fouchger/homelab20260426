---
# ==============================================================================
# File: ansible/playbooks/mikrotik_backup.yml
# Purpose:
#   Back up MikroTik RouterOS configuration exports, including sensitive values.
# Notes:
#   - Uses SSH/network_cli through community.routeros.
#   - Writes backups to state/mikrotik/YYYYMMDD-HHMM by default.
#   - The generated export includes secrets; keep state/mikrotik out of Git.
# ==============================================================================

- name: Back up MikroTik RouterOS configuration
  hosts: mikrotik
  gather_facts: false

  vars:
    ansible_password: "{{ lookup('env', 'MIKROTIK_ROUTER_ADMIN_PASSWORD') | default(omit, true) }}"
    mikrotik_backup_root: "{{ lookup('env', 'MIKROTIK_BACKUP_ROOT') | default(playbook_dir ~ '/../../state/mikrotik', true) }}"
    mikrotik_backup_stamp: "{{ lookup('env', 'MIKROTIK_BACKUP_STAMP') | default(lookup('pipe', 'date +%Y%m%d-%H%M'), true) }}"
    mikrotik_backup_dir: "{{ mikrotik_backup_root }}/{{ mikrotik_backup_stamp }}"
    mikrotik_export_command: "/export terse show-sensitive"
    mikrotik_backup_no_log: "{{ (lookup('env', 'MIKROTIK_BACKUP_NO_LOG') | default('true', true)) | bool }}"

  tasks:
    - name: Ensure local MikroTik backup directory exists
      ansible.builtin.file:
        path: "{{ mikrotik_backup_dir }}"
        state: directory
        mode: '0700'
      delegate_to: localhost
      run_once: true

    - name: Check RouterOS command channel before sensitive export
      community.routeros.command:
        commands:
          - /system identity print
          - /system resource print
      register: mikrotik_preflight

    - name: Confirm RouterOS command channel is ready
      ansible.builtin.debug:
        msg: "RouterOS command channel is ready for {{ inventory_hostname }}."

    - name: Export RouterOS configuration with sensitive values included
      community.routeros.command:
        commands:
          - "{{ mikrotik_export_command }}"
      register: mikrotik_export
      no_log: "{{ mikrotik_backup_no_log }}"

    - name: Write full RouterOS export to local state directory
      ansible.builtin.copy:
        dest: "{{ mikrotik_backup_dir }}/{{ inventory_hostname }}.rsc"
        content: |
          # ==============================================================================
          # File: {{ inventory_hostname }}.rsc
          # Purpose:
          #   MikroTik RouterOS export backup with sensitive values included.
          # Notes:
          #   - Generated by ansible/playbooks/mikrotik_backup.yml.
          #   - Store securely. Do not commit this file to Git.
          # ==============================================================================
          {{ mikrotik_export.stdout[0] | default('') }}
        mode: '0600'
      delegate_to: localhost
      no_log: true

    - name: Write non-secret backup manifest
      ansible.builtin.copy:
        dest: "{{ mikrotik_backup_dir }}/manifest.txt"
        content: |
          # ==============================================================================
          # File: manifest.txt
          # Purpose:
          #   Non-secret metadata for a MikroTik backup run.
          # ==============================================================================
          backup_stamp={{ mikrotik_backup_stamp }}
          inventory_host={{ inventory_hostname }}
          backup_file={{ mikrotik_backup_dir }}/{{ inventory_hostname }}.rsc
          export_command={{ mikrotik_export_command }}
        mode: '0600'
      delegate_to: localhost

    - name: Confirm backup location without exposing secrets
      ansible.builtin.debug:
        msg: "MikroTik backup saved to {{ mikrotik_backup_dir }}/{{ inventory_hostname }}.rsc"
