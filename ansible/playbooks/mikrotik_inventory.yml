---
# ==============================================================================
# File: ansible/playbooks/mikrotik_inventory.yml
# Purpose:
#   Generate the runtime Ansible inventory for MikroTik RouterOS hosts from
#   environment variables loaded from state/config/.env.
# Notes:
#   - This playbook runs locally and writes state/ansible/inventory.yml.
#   - It intentionally uses SSH key authentication by default.
#   - Secrets should not be written to the generated inventory.
# ==============================================================================

- name: Generate MikroTik Ansible inventory
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    repo_root: "{{ lookup('env', 'ROOT_DIR') | default(playbook_dir ~ '/../..', true) }}"
    state_dir: "{{ lookup('env', 'STATE_DIR') | default(repo_root ~ '/state', true) }}"
    inventory_dir: "{{ state_dir }}/ansible"
    inventory_file: "{{ inventory_dir }}/inventory.yml"
    mikrotik_default_name: "{{ lookup('env', 'MIKROTIK_NAME') | default('hap-ax2', true) }}"
    mikrotik_routers_raw: "{{ lookup('env', 'MIKROTIK_ROUTERS') | default(mikrotik_default_name, true) }}"
    mikrotik_routers: "{{ mikrotik_routers_raw.split(',') | map('trim') | reject('equalto', '') | list }}"
    mikrotik_default_port: "{{ lookup('env', 'MIKROTIK_PORT') | default('22', true) }}"
    mikrotik_default_user: "{{ lookup('env', 'MIKROTIK_USER') | default('admin', true) }}"
    mikrotik_default_host: "{{ lookup('env', 'MIKROTIK_HOST') | default('', true) }}"
    mikrotik_default_timeout: "{{ lookup('env', 'MIKROTIK_COMMAND_TIMEOUT') | default('120', true) }}"
    ssh_key_path: "{{ lookup('env', 'SSH_KEY_PATH') | default(lookup('env', 'HOME') ~ '/.ssh/homelab_ed25519', true) }}"

  tasks:
    - name: Ensure Ansible state directory exists
      ansible.builtin.file:
        path: "{{ inventory_dir }}"
        state: directory
        mode: '0700'

    - name: Refuse to generate inventory without at least one router
      ansible.builtin.assert:
        that:
          - mikrotik_routers | length > 0
        fail_msg: "Set MIKROTIK_NAME or MIKROTIK_ROUTERS in state/config/.env."

    - name: Render MikroTik inventory from environment values
      ansible.builtin.copy:
        dest: "{{ inventory_file }}"
        mode: '0600'
        content: |-
          ---
          # ==============================================================================
          # File: state/ansible/inventory.yml
          # Purpose:
          #   Generated Ansible inventory for homelab network automation.
          # Notes:
          #   - Generated by ansible/playbooks/mikrotik_inventory.yml.
          #   - Do not edit by hand; update state/config/.env and regenerate.
          #   - Secrets are intentionally not stored in this file.
          # ==============================================================================
          all:
            children:
              mikrotik:
                hosts:
          {% for router_name in mikrotik_routers %}
          {% set router_key = router_name | upper | regex_replace('[^A-Z0-9]+', '_') | regex_replace('^_+', '') | regex_replace('_+$', '') %}
          {% set scoped_host = lookup('env', 'MIKROTIK_' ~ router_key ~ '_HOST') | default('', true) %}
          {% set scoped_user = lookup('env', 'MIKROTIK_' ~ router_key ~ '_USER') | default('', true) %}
          {% set scoped_port = lookup('env', 'MIKROTIK_' ~ router_key ~ '_PORT') | default('', true) %}
          {% set scoped_timeout = lookup('env', 'MIKROTIK_' ~ router_key ~ '_COMMAND_TIMEOUT') | default('', true) %}
                  {{ router_name }}:
                    ansible_host: "{{ scoped_host | default(mikrotik_default_host, true) }}"
                    ansible_user: "{{ scoped_user | default(mikrotik_default_user, true) }}"
                    ansible_port: {{ scoped_port | default(mikrotik_default_port, true) }}
                    ansible_ssh_private_key_file: "{{ ssh_key_path }}"
                    ansible_connection: ansible.netcommon.network_cli
                    ansible_network_os: community.routeros.routeros
                    ansible_command_timeout: {{ scoped_timeout | default(mikrotik_default_timeout, true) }}
          {% endfor %}

    - name: Confirm generated inventory path
      ansible.builtin.debug:
        msg: "Generated {{ inventory_file }}"
