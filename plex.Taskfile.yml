# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# ==============================================================================
# File: plex.Taskfile.yml
# Purpose:
#   Plex-specific homelab automation tasks.
# Notes:
#   - Targets only the Ansible inventory group named "plex".
#   - Network mount tasks are idempotent; existing correct mounts are left alone.
#   - OMV CIFS settings are read from state/config/.env and prompted/saved when missing.
# ==============================================================================

version: '3'

silent: true

tasks:
  default:
    desc: Show available Plex tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available Plex tasks
    cmds:
      - task --taskfile '{{.TASKFILE}}' --list

  network-mounts:check:
    desc: Preview OMV/CIFS network mounts on Plex servers only
    cmds:
      - |
        set -euo pipefail
        ANSIBLE_NETWORK_MOUNTS_LIMIT=plex \
          task ansible:network-mounts:check

  network-mounts:manage:
    desc: Mount OMV/CIFS network drives on Plex servers only
    cmds:
      - |
        set -euo pipefail
        ANSIBLE_NETWORK_MOUNTS_LIMIT=plex \
          task ansible:network-mounts:manage

  mount-servers:
    desc: Alias for mounting OMV/CIFS network drives on Plex servers only
    cmds:
      - task: network-mounts:manage
