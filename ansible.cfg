# ==============================================================================
# File: ansible.cfg
# Purpose:
#   Repository-local Ansible configuration for homelab automation.
# Notes:
#   - Runtime inventory is generated under state/ansible/inventory.yml.
#   - Galaxy collections are installed under ansible/collections.
# ==============================================================================

[defaults]
inventory = state/ansible/inventory.yml
roles_path = ansible/roles
collections_path = ansible/collections
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
bin_ansible_callbacks = True

[persistent_connection]
command_timeout = 120
connect_timeout = 30
connect_retry_timeout = 30
