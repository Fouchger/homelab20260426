# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# =============================================================================
# File: taskfile/secrets_openbao.Taskfile.yml
# Purpose:
#   Manage the local OpenBao runtime for homelab secrets.
#
# Notes:
#   - Run task secrets_age:prepare before this workflow.
#   - OpenBao uses local TLS and integrated Raft storage.
#   - Bootstrap outputs are encrypted with the SOPS and age workflow.
# =============================================================================

version: '3'

silent: true

vars:
  OPENBAO_RUNTIME_SYSTEM_DIR: '{{default "/var/lib/openbao" .OPENBAO_RUNTIME_SYSTEM_DIR}}'
  OPENBAO_DATA_DIR_ABS: '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}/data'
  OPENBAO_INSTALL_DIR: '{{default "/etc/openbao" .OPENBAO_INSTALL_DIR}}'
  OPENBAO_INSTALL_TLS_LINK: '{{default "/opt/openbao/tls" .OPENBAO_INSTALL_TLS_LINK}}'
  OPENBAO_SYSTEMD_UNIT: '{{default "openbao" .OPENBAO_SYSTEMD_UNIT}}'
  OPENBAO_SYSTEMD_INSTALLED_FILE: '/etc/systemd/system/{{.OPENBAO_SYSTEMD_UNIT}}.service'

  OPENBAO_DIR: '{{.SECRETS_DIR}}/openbao'
  OPENBAO_BOOTSTRAP_DIR: '{{.OPENBAO_DIR}}/bootstrap'
  OPENBAO_POLICIES_DIR: '{{.OPENBAO_DIR}}/policies'
  OPENBAO_RENDERED_DIR: '{{.OPENBAO_DIR}}/rendered'
  OPENBAO_TLS_DIR: '{{.OPENBAO_DIR}}/tls'
  OPENBAO_CA_DIR: '{{.OPENBAO_TLS_DIR}}/ca'
  OPENBAO_SERVER_TLS_DIR: '{{.OPENBAO_TLS_DIR}}/server'

  OPENBAO_CONFIG_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.hcl'
  OPENBAO_CLI_ENV_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.env'
  OPENBAO_RUNTIME_ENV_RENDERED_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.runtime.env'
  OPENBAO_RUNTIME_ENV_INSTALLED_FILE: '{{.OPENBAO_INSTALL_DIR}}/openbao.env'
  OPENBAO_SYSTEMD_RENDERED_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.service'
  OPENBAO_POLICY_AUTOUNSEAL: '{{.OPENBAO_POLICIES_DIR}}/autounseal.hcl'
  OPENBAO_INIT_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/init.enc.json'
  OPENBAO_KEYS_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/unseal-keys.enc.json'
  OPENBAO_ROOT_TOKEN_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/root-token.enc.json'
  OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/transit-autounseal.enc.json'
  OPENBAO_STATUS_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/status.json'
  OPENBAO_RAFT_SNAPSHOT_FILE: '{{.BACKUP_DIR}}/openbao-raft-latest.snap'
  OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE: '{{.BACKUP_DIR}}/openbao-raft-{{now | date "20060102T150405Z0700"}}.snap'
  OPENBAO_OFFLINE_BUNDLE_FILE: '{{.BACKUP_DIR}}/openbao-offline-bundle-{{now | date "20060102T150405Z0700"}}.tar.gz'
  OPENBAO_AUDIT_FILE: '{{.AUDIT_DIR}}/openbao-audit-{{now | date "20060102T150405Z0700"}}.json'
  OPENBAO_AUDIT_LATEST_FILE: '{{.AUDIT_DIR}}/openbao-audit-latest.json'

  OPENBAO_SCHEME: '{{default "https" .OPENBAO_SCHEME}}'
  OPENBAO_HOST: '{{default "127.0.0.1" .OPENBAO_HOST}}'
  OPENBAO_PORT: '{{default "8200" .OPENBAO_PORT}}'
  OPENBAO_CLUSTER_PORT: '{{default "8201" .OPENBAO_CLUSTER_PORT}}'
  OPENBAO_ADDR: '{{.OPENBAO_SCHEME}}://{{.OPENBAO_HOST}}:{{.OPENBAO_PORT}}'
  OPENBAO_API_ADDR: '{{.OPENBAO_ADDR}}'
  OPENBAO_CLUSTER_ADDR: 'https://{{.OPENBAO_HOST}}:{{.OPENBAO_CLUSTER_PORT}}'
  OPENBAO_INIT_SHARES: '{{default "5" .OPENBAO_INIT_SHARES}}'
  OPENBAO_INIT_THRESHOLD: '{{default "3" .OPENBAO_INIT_THRESHOLD}}'
  OPENBAO_AUTOUNSEAL_KEY_NAME: '{{default "autounseal" .OPENBAO_AUTOUNSEAL_KEY_NAME}}'
  OPENBAO_AUTOUNSEAL_MOUNT_PATH: '{{default "transit/" .OPENBAO_AUTOUNSEAL_MOUNT_PATH}}'
  OPENBAO_RELEASES_URL: 'https://github.com/openbao/openbao/releases/latest'
  VAULT_CLIENT_TIMEOUT: '{{default "300s" .VAULT_CLIENT_TIMEOUT}}'
  CERT_RENEW_DAYS: '{{default "825" .CERT_RENEW_DAYS}}'
  CONFIRM_DESTROY: '{{default "false" .CONFIRM_DESTROY}}'
  TAKE_BACKUP_BEFORE_DESTROY: '{{default "true" .TAKE_BACKUP_BEFORE_DESTROY}}'
  PURGE_PACKAGES: '{{default "true" .PURGE_PACKAGES}}'

tasks:
  default:
    desc: Show available OpenBao tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available OpenBao tasks
    cmds:
      - task --taskfile '{{.TASKFILE}}' --list

  prepare:
    desc: Prepare the OpenBao runtime with initialising it
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Prepare the OpenBao runtime with initialising it" "PEACH"       
      - task: prerequisites:check
      - task: init
      - task: tools:install
      - task: runtime:install
      - task: start
      - task: init:server
      - task: unseal
      - task: secrets:enable
      - task: transit:prepare-autounseal
      - task: status
      - task: health
      - task: report

  bootstrap:
    desc: Run the end-to-end standalone OpenBao bootstrap
    cmds:
      - task: prepare
      - task: start
      - task: init:server
      - task: unseal
      - task: secrets:enable
      - task: transit:prepare-autounseal
      - task: report

  prerequisites:check:
    desc: Verify SOPS and age are ready before OpenBao runs
    cmds:
      - |
        set -euo pipefail
        [ -f '{{.AGE_KEYS_FILE}}' ] || { echo 'Age identities missing. Run task secrets_age:prepare first.' >&2; exit 1; }
        [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ] || { echo 'Encrypted passwords file missing. Run task secrets_age:prepare first.' >&2; exit 1; }
        command -v sops >/dev/null 2>&1 || { echo 'SOPS is missing. Run task secrets_age:prepare first.' >&2; exit 1; }

  init:
    internal: true
    desc: Create OpenBao state directories
    cmds:
      - |
        # =============================================================================
        # Task: init
        # Purpose:
        #   Create local OpenBao state directories.
        # =============================================================================
        set -euo pipefail
        mkdir -p \
          '{{.OPENBAO_BOOTSTRAP_DIR}}' \
          '{{.OPENBAO_POLICIES_DIR}}' \
          '{{.OPENBAO_RENDERED_DIR}}' \
          '{{.OPENBAO_CA_DIR}}' \
          '{{.OPENBAO_SERVER_TLS_DIR}}' \
          '{{.TMP_DIR}}' \
          '{{.BACKUP_DIR}}' \
          '{{.DR_DIR}}' \
          '{{.AUDIT_DIR}}'
        chmod 700 \
          '{{.OPENBAO_BOOTSTRAP_DIR}}' \
          '{{.OPENBAO_POLICIES_DIR}}' \
          '{{.OPENBAO_RENDERED_DIR}}' \
          '{{.OPENBAO_CA_DIR}}' \
          '{{.OPENBAO_SERVER_TLS_DIR}}' \
          '{{.TMP_DIR}}' \
          '{{.BACKUP_DIR}}' \
          '{{.DR_DIR}}' \
          '{{.AUDIT_DIR}}'

  tools:check:apt:
    internal: true
    desc: Ensure Debian or Ubuntu package tooling is available
    cmds:
      - |
        set -euo pipefail
        command -v apt-get >/dev/null 2>&1
        command -v dpkg >/dev/null 2>&1
        os_id="$(. /etc/os-release && printf '%s' "$ID")"
        case "$os_id" in
          ubuntu|debian) ;;
          *) echo "Unsupported distribution: ${os_id}. Only Ubuntu and Debian are supported." >&2; exit 1 ;;
        esac

  tools:install:
    internal: true
    desc: Install OpenBao and supporting tools
    deps: [tools:check:apt]
    vars:
      ARCH:
        sh: |
          case "$(uname -m)" in
            x86_64|amd64) echo amd64 ;;
            aarch64|arm64) echo arm64 ;;
            *) echo unsupported ;;
          esac
      OPENBAO_VERSION:
        sh: |
          curl -fsSLI -o /dev/null -w '%{url_effective}' '{{.OPENBAO_RELEASES_URL}}' | sed 's#.*/tag/v##'
      PKG_URL: 'https://github.com/openbao/openbao/releases/download/v{{.OPENBAO_VERSION}}/openbao_{{.OPENBAO_VERSION}}_linux_{{.ARCH}}.deb'
    preconditions:
      - sh: '[ "{{.ARCH}}" != "unsupported" ]'
        msg: 'Unsupported architecture. Only amd64 and arm64 are supported.'
    cmds:
      - |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends jq curl openssl ca-certificates gnupg tar
        if ! command -v bao >/dev/null 2>&1; then
          temp_package="$(mktemp -p /var/tmp openbao.XXXXXX.deb)"
          trap 'rm -f "$temp_package"' EXIT
          curl -fL '{{.PKG_URL}}' -o "$temp_package"
          sudo apt-get install -y "$temp_package"
        fi
        sudo mkdir -p '{{.OPENBAO_INSTALL_DIR}}'
        sudo mkdir -p "$(dirname '{{.OPENBAO_INSTALL_TLS_LINK}}')"
        sudo rm -rf '{{.OPENBAO_INSTALL_TLS_LINK}}'
        sudo ln -s '{{.OPENBAO_INSTALL_DIR}}' '{{.OPENBAO_INSTALL_TLS_LINK}}'
      - task: tools:check

  tools:check:
    desc: Validate required OpenBao tooling
    cmds:
      - |
        set -euo pipefail
        missing=0
        for tool in bao jq curl openssl tar systemctl journalctl; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "Missing required tool: $tool" >&2
            missing=1
          fi
        done
        [ "$missing" -eq 0 ]
        echo 'OpenBao tooling check completed successfully.'

  tls:ca:init:
    internal: true
    desc: Generate a local CA for OpenBao TLS if missing
    deps: [init]
    cmds:
      - |
        set -euo pipefail
        if [ -f '{{.OPENBAO_CA_DIR}}/ca.key.pem' ] && [ -f '{{.OPENBAO_CA_DIR}}/ca.cert.pem' ]; then
          exit 0
        fi
        openssl genrsa -out '{{.OPENBAO_CA_DIR}}/ca.key.pem' 4096
        openssl req -x509 -new -nodes -key '{{.OPENBAO_CA_DIR}}/ca.key.pem' -sha256 -days 3650 -subj '/CN=homelab-openbao-ca' -out '{{.OPENBAO_CA_DIR}}/ca.cert.pem'
        chmod 600 '{{.OPENBAO_CA_DIR}}/ca.key.pem'
        chmod 644 '{{.OPENBAO_CA_DIR}}/ca.cert.pem'

  tls:server:init:
    internal: true
    desc: Generate a TLS server certificate for OpenBao if missing
    deps: [tls:ca:init]
    cmds:
      - |
        set -euo pipefail
        if [ -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' ] && [ -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' ]; then
          exit 0
        fi
        config_file='{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'
        host_short="$(hostname -s 2>/dev/null || echo '{{.OPENBAO_HOST}}')"
        host_fqdn="$(hostname -f 2>/dev/null || echo "$host_short")"
        cat > "$config_file" <<EOF2
        [req]
        default_bits = 4096
        prompt = no
        default_md = sha256
        distinguished_name = dn
        req_extensions = req_ext
        x509_extensions = v3_server

        [dn]
        CN = ${host_fqdn}

        [req_ext]
        subjectAltName = @alt_names

        [v3_server]
        subjectAltName = @alt_names
        basicConstraints = CA:FALSE
        keyUsage = digitalSignature, keyEncipherment
        extendedKeyUsage = serverAuth

        [alt_names]
        DNS.1 = localhost
        DNS.2 = ${host_short}
        DNS.3 = ${host_fqdn}
        IP.1 = 127.0.0.1
        EOF2
        openssl genrsa -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' 4096
        openssl req -new -key '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' -config "$config_file"
        openssl x509 -req -in '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' -CA '{{.OPENBAO_CA_DIR}}/ca.cert.pem' -CAkey '{{.OPENBAO_CA_DIR}}/ca.key.pem' -CAcreateserial -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' -days '{{.CERT_RENEW_DAYS}}' -sha256 -extensions v3_server -extfile "$config_file"
        chmod 600 '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem'
        chmod 644 '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem'

  policy:render:
    internal: true
    desc: Render standard OpenBao policy for transit auto-unseal
    deps: [init]
    cmds:
      - |
        set -euo pipefail
        cat > '{{.OPENBAO_POLICY_AUTOUNSEAL}}' <<EOF2
        # =============================================================================
        # File: autounseal.hcl
        # Purpose:
        #   Policy for a token used to manage transit-backed auto-unseal.
        # =============================================================================
        path "{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}encrypt/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["update"]
        }

        path "{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}decrypt/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["update"]
        }

        path "{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["read"]
        }
        EOF2
        chmod 600 '{{.OPENBAO_POLICY_AUTOUNSEAL}}'

  config:render:
    internal: true
    desc: Render standalone OpenBao configuration and environment files
    deps: [tls:server:init, policy:render]
    cmds:
      - |
        set -euo pipefail
        cat > '{{.OPENBAO_CONFIG_FILE}}' <<EOF2
        # =============================================================================
        # File: openbao.hcl
        # Purpose:
        #   Standalone OpenBao server configuration using integrated Raft storage.
        # =============================================================================
        ui = true
        api_addr = "{{.OPENBAO_API_ADDR}}"
        cluster_addr = "{{.OPENBAO_CLUSTER_ADDR}}"

        listener "tcp" {
          address = "0.0.0.0:{{.OPENBAO_PORT}}"
          cluster_address = "0.0.0.0:{{.OPENBAO_CLUSTER_PORT}}"
          tls_disable = 0
          tls_cert_file = "{{.OPENBAO_INSTALL_DIR}}/server.cert.pem"
          tls_key_file = "{{.OPENBAO_INSTALL_DIR}}/server.key.pem"
        }

        storage "raft" {
          path = "{{.OPENBAO_DATA_DIR_ABS}}"
          node_id = "{{.OPENBAO_HOST}}"
        }

        telemetry {
          disable_hostname = true
          prometheus_retention_time = "24h"
        }
        EOF2
        cat > '{{.OPENBAO_CLI_ENV_FILE}}' <<EOF2
        # =============================================================================
        # File: openbao.env
        # Purpose:
        #   Standard OpenBao CLI environment variables for this homelab.
        # =============================================================================
        export BAO_ADDR='{{.OPENBAO_ADDR}}'
        export BAO_CACERT='{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem'
        export BAO_FORMAT='json'
        export VAULT_ADDR='{{.OPENBAO_ADDR}}'
        export VAULT_CACERT='{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem'
        export VAULT_CLIENT_TIMEOUT='{{.VAULT_CLIENT_TIMEOUT}}'
        EOF2
        cat > '{{.OPENBAO_RUNTIME_ENV_RENDERED_FILE}}' <<EOF2
        # =============================================================================
        # File: openbao.runtime.env
        # Purpose:
        #   Runtime environment consumed by systemd for OpenBao.
        # =============================================================================
        VAULT_ADDR={{.OPENBAO_ADDR}}
        VAULT_CACERT={{.OPENBAO_INSTALL_DIR}}/ca.cert.pem
        VAULT_CLIENT_TIMEOUT={{.VAULT_CLIENT_TIMEOUT}}
        EOF2
        chmod 640 '{{.OPENBAO_CONFIG_FILE}}' '{{.OPENBAO_RUNTIME_ENV_RENDERED_FILE}}'
        chmod 600 '{{.OPENBAO_CLI_ENV_FILE}}'

  config:install:
    internal: true
    desc: Install rendered OpenBao configuration into /etc/openbao
    deps: [config:render]
    cmds:
      - |
        set -euo pipefail
        sudo mkdir -p '{{.OPENBAO_INSTALL_DIR}}'
        sudo install -m 640 '{{.OPENBAO_CONFIG_FILE}}' '{{.OPENBAO_INSTALL_DIR}}/openbao.hcl'
        sudo install -m 640 '{{.OPENBAO_RUNTIME_ENV_RENDERED_FILE}}' '{{.OPENBAO_RUNTIME_ENV_INSTALLED_FILE}}'
        sudo install -m 644 '{{.OPENBAO_CA_DIR}}/ca.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem'
        sudo install -m 644 '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/server.cert.pem'
        sudo install -m 640 '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' '{{.OPENBAO_INSTALL_DIR}}/server.key.pem'
        sudo mkdir -p "$(dirname '{{.OPENBAO_INSTALL_TLS_LINK}}')"
        sudo rm -rf '{{.OPENBAO_INSTALL_TLS_LINK}}'
        sudo ln -s '{{.OPENBAO_INSTALL_DIR}}' '{{.OPENBAO_INSTALL_TLS_LINK}}'

  systemd:render:
    internal: true
    desc: Render a hardened systemd unit for standalone OpenBao
    deps: [config:install]
    cmds:
      - |
        set -euo pipefail
        cat > '{{.OPENBAO_SYSTEMD_RENDERED_FILE}}' <<EOF2
        # =============================================================================
        # File: openbao.service
        # Purpose:
        #   systemd unit for a standalone OpenBao runtime.
        # =============================================================================
        [Unit]
        Description=OpenBao secrets management server
        Documentation=https://openbao.org/docs/
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        User=openbao
        Group=openbao
        EnvironmentFile=-{{.OPENBAO_RUNTIME_ENV_INSTALLED_FILE}}
        ExecStart=/usr/bin/bao server -config={{.OPENBAO_INSTALL_DIR}}/openbao.hcl
        ExecReload=/bin/kill --signal HUP $$MAINPID
        Restart=on-failure
        RestartSec=5
        UMask=0077
        LimitNOFILE=65536
        LimitMEMLOCK=infinity
        AmbientCapabilities=CAP_IPC_LOCK
        CapabilityBoundingSet=CAP_IPC_LOCK
        LockPersonality=true
        NoNewPrivileges=true
        PrivateTmp=true
        ProtectSystem=full
        ProtectHome=read-only
        ProtectControlGroups=true
        ProtectKernelLogs=true
        ProtectKernelModules=true
        ProtectKernelTunables=true
        ProtectProc=invisible
        ProcSubset=pid
        ReadWritePaths={{.OPENBAO_INSTALL_DIR}} {{.OPENBAO_DATA_DIR_ABS}}
        SystemCallArchitectures=native
        WorkingDirectory={{.OPENBAO_DATA_DIR_ABS}}

        [Install]
        WantedBy=multi-user.target
        EOF2
        chmod 600 '{{.OPENBAO_SYSTEMD_RENDERED_FILE}}'

  systemd:install:
    internal: true
    desc: Install the OpenBao systemd unit and ensure runtime permissions are correct
    deps: [systemd:render]
    cmds:
      - |
        set -euo pipefail
        unit_name='{{.OPENBAO_SYSTEMD_UNIT}}'
        unit_file="/etc/systemd/system/${unit_name}.service"
        if ! getent group openbao >/dev/null 2>&1; then sudo groupadd --system openbao; fi
        if ! id openbao >/dev/null 2>&1; then sudo useradd --system --home '{{.OPENBAO_DATA_DIR_ABS}}' --shell /usr/sbin/nologin --gid openbao openbao; fi
        sudo mkdir -p '{{.OPENBAO_INSTALL_DIR}}' '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}' '{{.OPENBAO_DATA_DIR_ABS}}'
        sudo install -m 644 '{{.OPENBAO_SYSTEMD_RENDERED_FILE}}' "$unit_file"
        sudo chown -R root:openbao '{{.OPENBAO_INSTALL_DIR}}'
        sudo chmod 750 '{{.OPENBAO_INSTALL_DIR}}'
        sudo chmod 640 '{{.OPENBAO_INSTALL_DIR}}/openbao.hcl' '{{.OPENBAO_RUNTIME_ENV_INSTALLED_FILE}}' '{{.OPENBAO_INSTALL_DIR}}/server.key.pem'
        sudo chmod 644 '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/server.cert.pem'
        sudo chown root:openbao '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}'
        sudo chmod 750 '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}'
        sudo chown -R openbao:openbao '{{.OPENBAO_DATA_DIR_ABS}}'
        sudo find '{{.OPENBAO_DATA_DIR_ABS}}' -type d -exec chmod 750 {} +
        sudo find '{{.OPENBAO_DATA_DIR_ABS}}' -type f -exec chmod 640 {} + || true
        sudo systemctl daemon-reexec
        sudo systemctl daemon-reload
        sudo systemctl enable "${unit_name}.service"

  runtime:install:
    internal: true
    desc: Render and install the complete OpenBao runtime
    cmds:
      - task: systemd:install

  start:
    desc: Start OpenBao and wait until the API is reachable
    deps: [runtime:install]
    cmds:
      - sudo systemctl reset-failed '{{.OPENBAO_SYSTEMD_UNIT}}.service' || true
      - sudo systemctl start '{{.OPENBAO_SYSTEMD_UNIT}}.service'
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        attempt=0
        max_attempts=60
        while [ "$attempt" -lt "$max_attempts" ]; do
          if systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1; then
            if curl --silent --show-error --fail --cacert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' '{{.OPENBAO_ADDR}}/v1/sys/health?uninitcode=200&sealedcode=200&standbyok=true&perfstandbyok=true' >/dev/null 2>&1; then
              echo 'OpenBao API is reachable.'
              exit 0
            fi
            if bao status -format=json >/dev/null 2>&1; then
              echo 'OpenBao API is responding.'
              exit 0
            fi
          fi
          attempt=$((attempt + 1))
          sleep 1
        done
        sudo systemctl --no-pager --full status '{{.OPENBAO_SYSTEMD_UNIT}}.service' || true
        sudo journalctl -u '{{.OPENBAO_SYSTEMD_UNIT}}.service' -n 100 --no-pager || true
        exit 1

  init:server:
    internal: true
    desc: Initialise OpenBao once and persist encrypted bootstrap outputs
    cmds:
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        status_json="$(bao status -format=json 2>/dev/null || true)"
        if [ -n "$status_json" ] && printf '%s' "$status_json" | jq -e '.initialized == true' >/dev/null 2>&1; then
          echo 'OpenBao is already initialised.'
          exit 0
        fi
        temp_init='{{.TMP_DIR}}/openbao-init.json'
        temp_keys='{{.TMP_DIR}}/openbao-unseal-keys.json'
        temp_root='{{.TMP_DIR}}/openbao-root-token.json'
        trap 'rm -f "$temp_init" "$temp_keys" "$temp_root"' EXIT
        bao operator init -key-shares='{{.OPENBAO_INIT_SHARES}}' -key-threshold='{{.OPENBAO_INIT_THRESHOLD}}' -format=json > "$temp_init"
        jq '{unseal_keys_b64: .unseal_keys_b64, unseal_keys_hex: .unseal_keys_hex}' "$temp_init" > "$temp_keys"
        jq '{root_token: .root_token}' "$temp_init" > "$temp_root"
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/init.enc.json' --input-type json --output-type json "$temp_init" > '{{.OPENBAO_INIT_ENC_FILE}}'
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/unseal-keys.enc.json' --input-type json --output-type json "$temp_keys" > '{{.OPENBAO_KEYS_ENC_FILE}}'
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/root-token.enc.json' --input-type json --output-type json "$temp_root" > '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}'
        chmod 600 '{{.OPENBAO_INIT_ENC_FILE}}' '{{.OPENBAO_KEYS_ENC_FILE}}' '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}'
      - task: passwords:store:openbao:root

  unseal:
    desc: Unseal OpenBao using stored encrypted bootstrap keys
    cmds:
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        status_json="$(bao status -format=json 2>/dev/null || true)"
        sealed="$(printf '%s' "$status_json" | jq -r '.sealed // "unknown"')"
        if [ "$sealed" = 'false' ]; then echo 'OpenBao is already unsealed.'; exit 0; fi
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_INIT_ENC_FILE}}' \
          | jq -r '.unseal_keys_b64[0:{{.OPENBAO_INIT_THRESHOLD}}][]' \
          | while IFS= read -r key; do bao operator unseal "$key" >/dev/null; done

  secrets:enable:
    internal: true
    desc: Enable baseline OpenBao secret engines if needed
    cmds:
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        export BAO_TOKEN="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        bao secrets list -format=json | jq -e 'has("kv/")' >/dev/null 2>&1 || bao secrets enable -path=kv kv-v2
        bao secrets list -format=json | jq -e 'has("pki/")' >/dev/null 2>&1 || bao secrets enable pki
        bao secrets list -format=json | jq -e 'has("transit/")' >/dev/null 2>&1 || bao secrets enable transit

  transit:prepare-autounseal:
    internal: true
    desc: Create a transit key, policy, and orphan token for future external auto-unseal use
    deps: [secrets:enable]
    cmds:
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        export BAO_TOKEN="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        bao read -format=json '{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}' >/dev/null 2>&1 || bao write -f '{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}'
        bao policy read autounseal >/dev/null 2>&1 || bao policy write autounseal '{{.OPENBAO_POLICY_AUTOUNSEAL}}'
        if [ ! -f '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' ]; then
          temp_transit='{{.TMP_DIR}}/transit-autounseal.json'
          trap 'rm -f "$temp_transit"' EXIT
          token="$(bao token create -orphan -policy=autounseal -format=json | jq -r '.auth.client_token')"
          jq -n --arg token "$token" --arg key_name '{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}' --arg address '{{.OPENBAO_ADDR}}' --arg mount_path '{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}' --arg ca_cert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' '{token: $token, key_name: $key_name, address: $address, mount_path: $mount_path, ca_cert: $ca_cert}' > "$temp_transit"
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/transit-autounseal.enc.json' --input-type json --output-type json "$temp_transit" > '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}'
          chmod 600 '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}'
        fi
      - task: passwords:store:openbao:transit

  passwords:store:openbao:root:
    internal: true
    desc: Copy the saved OpenBao root token into the encrypted passwords env file
    cmds:
      - |
        set -euo pipefail
        token="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        task secrets_age:secret:update SECRET_GROUP=passwords SECRET_KEY=OPENBAO_ROOT_TOKEN SECRET_VALUE="$token"

  passwords:store:openbao:transit:
    internal: true
    desc: Copy the saved OpenBao transit token into the encrypted passwords env file
    cmds:
      - |
        set -euo pipefail
        token="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' | jq -r '.token')"
        task secrets_age:secret:update SECRET_GROUP=passwords SECRET_KEY=OPENBAO_TRANSIT_AUTOUNSEAL_TOKEN SECRET_VALUE="$token"

  status:
    desc: Show OpenBao seal and initialisation status
    cmds:
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        bao status -format=json | tee '{{.OPENBAO_STATUS_FILE}}' | jq .

  health:
    desc: Check whether the local OpenBao API is reachable
    cmds:
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        curl --silent --show-error --fail --cacert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' '{{.OPENBAO_ADDR}}/v1/sys/health?standbyok=true&perfstandbyok=true' | jq .

  backup:raft:
    desc: Save a fresh OpenBao raft snapshot
    cmds:
      - |
        set -euo pipefail
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        export BAO_TOKEN="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        mkdir -p '{{.BACKUP_DIR}}'
        bao operator raft snapshot save '{{.OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE}}'
        chmod 600 '{{.OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE}}'
        cp '{{.OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE}}' '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}'
        chmod 600 '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}'

  backup:offline:
    desc: Create an operator-ready offline recovery bundle
    cmds:
      - |
        set -euo pipefail
        mkdir -p '{{.BACKUP_DIR}}'
        task secrets_openbao:backup:raft >/dev/null 2>&1 || true
        tar -C '{{.ROOT_DIR}}' -czf '{{.OPENBAO_OFFLINE_BUNDLE_FILE}}' state/secrets/openbao state/backups/openbao-raft-latest.snap 2>/dev/null || tar -C '{{.ROOT_DIR}}' -czf '{{.OPENBAO_OFFLINE_BUNDLE_FILE}}' state/secrets/openbao
        chmod 600 '{{.OPENBAO_OFFLINE_BUNDLE_FILE}}'

  ops:renew:certs:
    desc: Renew the local OpenBao server certificate and validate the service
    deps: [backup:offline]
    cmds:
      - |
        set -euo pipefail
        rm -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'
        sudo rm -f '{{.OPENBAO_INSTALL_DIR}}/server.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/server.key.pem'
      - task: tls:server:init
      - task: systemd:install
      - task: restart:validate
      - task: health
      - task: ops:audit
      - task: status

  restart:validate:
    desc: Restart OpenBao and validate service health afterwards
    deps: [runtime:install]
    cmds:
      - |
        set -euo pipefail
        sudo systemctl restart '{{.OPENBAO_SYSTEMD_UNIT}}.service'
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        attempt=0
        while [ "$attempt" -lt 30 ]; do
          if systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1 && bao status -format=json >/dev/null 2>&1; then
            bao status -format=json | jq '{initialized, sealed, type, version, storage_type}'
            exit 0
          fi
          attempt=$((attempt + 1))
          sleep 1
        done
        sudo systemctl status '{{.OPENBAO_SYSTEMD_UNIT}}.service' --no-pager -l || true
        sudo journalctl -u '{{.OPENBAO_SYSTEMD_UNIT}}.service' -n 100 --no-pager || true
        exit 1

  ops:audit:
    desc: Produce a day-2 operational audit report
    cmds:
      - |
        set -euo pipefail
        mkdir -p '{{.AUDIT_DIR}}'
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        status_json="$(bao status -format=json 2>/dev/null || true)"
        printf '%s' "$status_json" | jq -e . >/dev/null 2>&1 || status_json='{}'
        health_json="$(curl --silent --show-error --fail --cacert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' '{{.OPENBAO_ADDR}}/v1/sys/health?standbyok=true&perfstandbyok=true' 2>/dev/null || true)"
        printf '%s' "$health_json" | jq -e . >/dev/null 2>&1 || health_json='{}'
        jq -n \
          --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --arg bao_version "$(bao version 2>/dev/null | head -n 1 || true)" \
          --arg active_state "$(systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' 2>/dev/null || echo inactive)" \
          --arg enabled_state "$(systemctl is-enabled '{{.OPENBAO_SYSTEMD_UNIT}}.service' 2>/dev/null || echo disabled)" \
          --argjson status "$status_json" \
          --argjson health "$health_json" \
          '{generated_at: $generated_at, bao_version: $bao_version, systemd: {active_state: $active_state, enabled_state: $enabled_state}, openbao_status: $status, openbao_health: $health}' > '{{.OPENBAO_AUDIT_FILE}}'
        cp '{{.OPENBAO_AUDIT_FILE}}' '{{.OPENBAO_AUDIT_LATEST_FILE}}'
        chmod 600 '{{.OPENBAO_AUDIT_FILE}}' '{{.OPENBAO_AUDIT_LATEST_FILE}}'
        jq . '{{.OPENBAO_AUDIT_FILE}}'

  destroy:
    desc: Remove the deployed OpenBao runtime and OpenBao local state
    preconditions:
      - sh: '[ "{{.CONFIRM_DESTROY}}" = "true" ]'
        msg: 'Destructive action blocked. Re-run with CONFIRM_DESTROY=true.'
    cmds:
      - |
        set -euo pipefail
        if [ '{{.TAKE_BACKUP_BEFORE_DESTROY}}' = 'true' ]; then task secrets_openbao:backup:offline || true; fi
        sudo systemctl stop '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1 || true
        sudo systemctl disable '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1 || true
        sudo rm -f '{{.OPENBAO_SYSTEMD_INSTALLED_FILE}}'
        sudo rm -rf '{{.OPENBAO_INSTALL_DIR}}' '{{.OPENBAO_INSTALL_TLS_LINK}}' '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}'
        rm -rf '{{.OPENBAO_DIR}}'
        id openbao >/dev/null 2>&1 && sudo userdel openbao >/dev/null 2>&1 || true
        getent group openbao >/dev/null 2>&1 && sudo groupdel openbao >/dev/null 2>&1 || true
        sudo systemctl daemon-reload >/dev/null 2>&1 || true
        echo 'OpenBao runtime and local OpenBao state removed successfully.'

  purge:
    desc: Remove OpenBao runtime, packages, and local OpenBao state
    preconditions:
      - sh: '[ "{{.CONFIRM_DESTROY}}" = "true" ]'
        msg: 'Destructive action blocked. Re-run with CONFIRM_DESTROY=true.'
    cmds:
      - task: destroy
        vars:
          CONFIRM_DESTROY: 'true'
          TAKE_BACKUP_BEFORE_DESTROY: 'true'
      - |
        set -euo pipefail
        if [ '{{.PURGE_PACKAGES}}' = 'true' ] && command -v apt-get >/dev/null 2>&1; then
          sudo apt-get purge -y openbao >/dev/null 2>&1 || true
          sudo apt-get autoremove -y >/dev/null 2>&1 || true
        fi
        echo 'OpenBao purge completed successfully.'

  report:
    desc: Print a concise OpenBao status report
    cmds:
      - |
        set -euo pipefail
        echo '--- openbao runtime ---'
        [ -f '{{.OPENBAO_CONFIG_FILE}}' ] && echo 'rendered config: present' || echo 'rendered config: missing'
        [ -f '{{.OPENBAO_SYSTEMD_INSTALLED_FILE}}' ] && echo 'systemd unit: installed' || echo 'systemd unit: missing'
        systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' 2>/dev/null || true
        echo '--- openbao bootstrap ---'
        [ -f '{{.OPENBAO_INIT_ENC_FILE}}' ] && echo 'bootstrap: initialised' || echo 'bootstrap: not initialised'
        [ -f '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' ] && echo 'root token: encrypted' || echo 'root token: missing'
