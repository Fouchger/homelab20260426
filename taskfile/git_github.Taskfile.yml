# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# =============================================================================
# File: taskfile/git_github.Taskfile.yml
# Purpose:
#   Install Git and GitHub CLI, configure Git identity, and authenticate GitHub.
#
# Notes:
#   - Shared repository paths are supplied by the root Taskfile.
#   - Non-secret configuration is stored in state/config/.env.
#   - GitHub tokens are stored only in the encrypted SOPS passwords file.
#   - This workflow targets Debian and Ubuntu hosts.
# =============================================================================

version: '3'

silent: true

vars:
  GITHUB_HOST: '{{default "github.com" .GITHUB_HOST}}'
  GITHUB_CLI_APT_KEYRING: /usr/share/keyrings/githubcli-archive-keyring.gpg
  GITHUB_CLI_APT_SOURCE: /etc/apt/sources.list.d/github-cli.list

tasks:
  default:
    desc: Show available Git and GitHub tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available Git and GitHub tasks
    cmds:
      - task --taskfile '{{.TASKFILE}}' --list

  bootstrap:
    desc: Install and configure Git, GitHub CLI, GitHub authentication, and Git credential helper
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Prepare Git and GitHub CLI" "PEACH"
      - task: init
      - task: tools:install
      - task: config:git
      - task: auth:github
      - task: auth:git
      - task: report

  init:
    internal: true
    desc: Create standard Git and GitHub configuration directories
    cmds:
      - |
        # =============================================================================
        # Task: init
        # Purpose:
        #   Create repository-side directories used by Git and GitHub tasks.
        # =============================================================================
        set -euo pipefail
        mkdir -p \
          '{{.CONFIG_DIR}}' \
          '{{.PASSWORDS_DIR}}' \
          '{{.TMP_DIR}}'
        chmod 700 \
          '{{.CONFIG_DIR}}' \
          '{{.PASSWORDS_DIR}}' \
          '{{.TMP_DIR}}'
        touch '{{.CONFIG_ENV_FILE}}'
        chmod 600 '{{.CONFIG_ENV_FILE}}'

  tools:check:apt:
    internal: true
    desc: Ensure Debian or Ubuntu package tooling is available
    cmds:
      - |
        set -euo pipefail
        command -v apt-get >/dev/null 2>&1
        command -v dpkg >/dev/null 2>&1
        [ -r /etc/os-release ]
        os_id="$(. /etc/os-release && printf '%s' "$ID")"
        case "$os_id" in
          ubuntu|debian) ;;
          *) echo "Unsupported distribution: ${os_id}. Only Ubuntu and Debian are supported." >&2; exit 1 ;;
        esac

  tools:install:
    desc: Install Git, GitHub CLI, and supporting tools
    deps: [tools:check:apt]
    cmds:
      - |
        # =============================================================================
        # Task: tools:install
        # Purpose:
        #   Install Git and GitHub CLI using apt.
        # =============================================================================
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends git curl ca-certificates gnupg jq sed
        if ! command -v sops >/dev/null 2>&1; then
          arch="$(dpkg --print-architecture)"
          version="$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/getsops/sops/releases/latest | sed 's#.*/tag/##; s#^v##')"
          package_file="sops_${version}_${arch}.deb"
          package_url="https://github.com/getsops/sops/releases/download/v${version}/${package_file}"
          temp_package="$(mktemp -p /var/tmp sops.XXXXXX.deb)"
          trap 'rm -f "$temp_package"' EXIT
          curl -fL "$package_url" -o "$temp_package"
          sudo apt-get install -y "$temp_package"
        fi
        if ! command -v gh >/dev/null 2>&1; then
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | sudo dd of='{{.GITHUB_CLI_APT_KEYRING}}' >/dev/null
          sudo chmod go+r '{{.GITHUB_CLI_APT_KEYRING}}'
          arch="$(dpkg --print-architecture)"
          echo "deb [arch=${arch} signed-by={{.GITHUB_CLI_APT_KEYRING}}] https://cli.github.com/packages stable main" \
            | sudo tee '{{.GITHUB_CLI_APT_SOURCE}}' >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gh
        fi
      - task: tools:check

  tools:check:
    desc: Validate required Git and GitHub tooling
    cmds:
      - |
        set -euo pipefail
        missing=0
        for tool in git gh curl jq sops; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "Missing required tool: $tool" >&2
            missing=1
          fi
        done
        [ "$missing" -eq 0 ]
        echo 'Git and GitHub tooling check completed successfully.'

  config:git:
    desc: Configure global Git user.name and user.email
    deps: [init]
    cmds:
      - |
        # =============================================================================
        # Task: config:git
        # Purpose:
        #   Configure Git identity from environment, existing Git config, or prompts.
        # =============================================================================
        set -euo pipefail

        get_env_value() {
          env_key="$1"
          if [ -f '{{.CONFIG_ENV_FILE}}' ]; then
            awk -F= -v key="$env_key" '$1 == key { sub(/^[^=]*=/, ""); print; exit }' '{{.CONFIG_ENV_FILE}}'
          fi
        }

        upsert_env_value() {
          env_key="$1"
          env_value="$2"
          temp_file="$(mktemp '{{.TMP_DIR}}/config-env.XXXXXX')"
          if [ -f '{{.CONFIG_ENV_FILE}}' ]; then
            awk -F= -v key="$env_key" '$1 != key' '{{.CONFIG_ENV_FILE}}' > "$temp_file"
          fi
          printf '%s=%s\n' "$env_key" "$env_value" >> "$temp_file"
          mv "$temp_file" '{{.CONFIG_ENV_FILE}}'
          chmod 600 '{{.CONFIG_ENV_FILE}}'
        }

        prompt_value() {
          prompt_text="$1"
          default_value="$2"
          value=""
          if [ -n "$default_value" ]; then
            printf '%s' "$default_value"
            return 0
          fi
          if [ '{{.NONINTERACTIVE}}' = '1' ]; then
            printf '%s' "$default_value"
            return 0
          fi
          printf '%s: ' "$prompt_text" > /dev/tty
          IFS= read -r value < /dev/tty
          printf '%s' "$value"
        }

        git_user_name="${GIT_USER_NAME:-$(get_env_value GIT_USER_NAME)}"
        git_user_email="${GIT_USER_EMAIL:-$(get_env_value GIT_USER_EMAIL)}"
        git_user_name="${git_user_name:-$(git config --global user.name || true)}"
        git_user_email="${git_user_email:-$(git config --global user.email || true)}"

        if [ -z "$git_user_name" ] || [ -z "$git_user_email" ]; then
          printf '\n--- Git User Details ---\n'
        fi
        git_user_name="$(prompt_value 'Git user.name' "$git_user_name")"
        git_user_email="$(prompt_value 'Git user.email' "$git_user_email")"

        [ -n "$git_user_name" ] || { echo 'Git user.name is required.' >&2; exit 1; }
        [ -n "$git_user_email" ] || { echo 'Git user.email is required.' >&2; exit 1; }

        git config --global user.name "$git_user_name"
        git config --global user.email "$git_user_email"
        upsert_env_value GIT_USER_NAME "$git_user_name"
        upsert_env_value GIT_USER_EMAIL "$git_user_email"

        echo "Git identity configured for ${git_user_name} <${git_user_email}>."

  auth:github:
    desc: Authenticate GitHub CLI using an encrypted SOPS token
    deps: [init, tools:check]
    cmds:
      - |
        # =============================================================================
        # Task: auth:github
        # Purpose:
        #   Store GitHub username in config and authenticate gh using encrypted token.
        # =============================================================================
        set -euo pipefail

        get_env_value() {
          env_file="$1"
          env_key="$2"
          if [ -f "$env_file" ]; then
            awk -F= -v key="$env_key" '$1 == key { sub(/^[^=]*=/, ""); print; exit }' "$env_file"
          fi
        }

        upsert_plain_env_value() {
          env_key="$1"
          env_value="$2"
          temp_file="$(mktemp '{{.TMP_DIR}}/config-env.XXXXXX')"
          if [ -f '{{.CONFIG_ENV_FILE}}' ]; then
            awk -F= -v key="$env_key" '$1 != key' '{{.CONFIG_ENV_FILE}}' > "$temp_file"
          fi
          printf '%s=%s\n' "$env_key" "$env_value" >> "$temp_file"
          mv "$temp_file" '{{.CONFIG_ENV_FILE}}'
          chmod 600 '{{.CONFIG_ENV_FILE}}'
        }

        prompt_value() {
          prompt_text="$1"
          default_value="$2"
          value=""
          if [ -n "$default_value" ]; then
            printf '%s' "$default_value"
            return 0
          fi
          if [ '{{.NONINTERACTIVE}}' = '1' ]; then
            printf '%s' "$default_value"
            return 0
          fi
          printf '%s: ' "$prompt_text" > /dev/tty
          IFS= read -r value < /dev/tty
          printf '%s' "$value"
        }

        prompt_secret() {
          prompt_text="$1"
          secret_value=""
          if [ '{{.NONINTERACTIVE}}' = '1' ]; then
            printf '%s' "${GITHUB_TOKEN:-${GH_TOKEN:-}}"
            return 0
          fi
          printf '%s: ' "$prompt_text" > /dev/tty
          stty -echo < /dev/tty
          IFS= read -r secret_value < /dev/tty
          stty echo < /dev/tty
          printf '\n' > /dev/tty
          printf '%s' "$secret_value"
        }

        ensure_encrypted_passwords_file() {
          if [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then
            return 0
          fi
          [ -f '{{.AGE_KEYS_FILE}}' ] || { echo 'Age keys are missing. Run task secrets_age:prepare first.' >&2; exit 1; }
          temp_plain="$(mktemp '{{.TMP_DIR}}/passwords.XXXXXX.env')"
          trap 'rm -f "$temp_plain"' EXIT
          cat > "$temp_plain" <<'EOF2'
        # =============================================================================
        # File: passwords.env
        # Purpose:
        #   Encrypted homelab secret values.
        # =============================================================================
        GITHUB_TOKEN=
        EOF2
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/passwords/passwords.enc.env' --input-type dotenv --output-type dotenv "$temp_plain" > '{{.PASSWORDS_ENC_ENV_FILE}}'
          chmod 600 '{{.PASSWORDS_ENC_ENV_FILE}}'
        }

        upsert_encrypted_env_value() {
          env_key="$1"
          env_value="$2"
          ensure_encrypted_passwords_file
          [ -f '{{.AGE_KEYS_FILE}}' ] || { echo 'Age keys are missing. Run task secrets_age:prepare first.' >&2; exit 1; }
          temp_plain="$(mktemp '{{.TMP_DIR}}/passwords.XXXXXX.env')"
          temp_updated="$(mktemp '{{.TMP_DIR}}/passwords.updated.XXXXXX.env')"
          trap 'rm -f "$temp_plain" "$temp_updated"' EXIT
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt --input-type dotenv --output-type dotenv '{{.PASSWORDS_ENC_ENV_FILE}}' > "$temp_plain"
          awk -F= -v key="$env_key" '$1 != key' "$temp_plain" > "$temp_updated"
          printf '%s=%s\n' "$env_key" "$env_value" >> "$temp_updated"
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/passwords/passwords.enc.env' --input-type dotenv --output-type dotenv "$temp_updated" > '{{.PASSWORDS_ENC_ENV_FILE}}'
          chmod 600 '{{.PASSWORDS_ENC_ENV_FILE}}'
        }

        read_encrypted_env_value() {
          env_key="$1"
          [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ] || return 0
          [ -f '{{.AGE_KEYS_FILE}}' ] || return 0
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt --input-type dotenv --output-type dotenv '{{.PASSWORDS_ENC_ENV_FILE}}' \
            | awk -F= -v key="$env_key" '$1 == key { sub(/^[^=]*=/, ""); print; exit }'
        }

        github_username="${GITHUB_USERNAME:-$(get_env_value '{{.CONFIG_ENV_FILE}}' GITHUB_USERNAME)}"
        if [ -z "$github_username" ]; then
          printf '\n--- Github User Details ---\n'
        fi
        github_username="$(prompt_value 'GitHub username' "$github_username")"
        [ -n "$github_username" ] || { echo 'GitHub username is required.' >&2; exit 1; }
        upsert_plain_env_value GITHUB_USERNAME "$github_username"

        github_token="${GITHUB_TOKEN:-${GH_TOKEN:-}}"
        if [ -z "$github_token" ]; then
          github_token="$(read_encrypted_env_value GITHUB_TOKEN || true)"
        fi
        if [ -z "$github_token" ] || [ "$github_token" = 'replace-me' ]; then
          printf '\n'
          github_token="$(prompt_secret 'GitHub token')"
        fi
        [ -n "$github_token" ] || { echo 'GitHub token is required.' >&2; exit 1; }
        echo ""

        upsert_encrypted_env_value GITHUB_TOKEN "$github_token"
        printf '%s' "$github_token" | gh auth login --hostname '{{.GITHUB_HOST}}' --with-token
        gh api user --hostname '{{.GITHUB_HOST}}' >/dev/null
        echo "GitHub CLI authenticated for ${github_username} on {{.GITHUB_HOST}}."

  auth:git:
    desc: Configure Git to use GitHub CLI credentials for GitHub HTTPS operations
    deps: [tools:check]
    cmds:
      - |
        # =============================================================================
        # Task: auth:git
        # Purpose:
        #   Configure Git credential helpers through GitHub CLI.
        # =============================================================================
        set -euo pipefail
        gh auth status --hostname '{{.GITHUB_HOST}}' >/dev/null
        gh auth setup-git --hostname '{{.GITHUB_HOST}}'
        echo 'Git credential helper configured through GitHub CLI.'

  status:
    desc: Show Git and GitHub authentication status
    cmds:
      - task: report

  report:
    desc: Report Git and GitHub configuration status
    cmds:
      - |
        # =============================================================================
        # Task: report
        # Purpose:
        #   Print a concise status report for Git and GitHub configuration.
        # =============================================================================
        set -euo pipefail
        echo 'Git and GitHub status'
        echo '====================='
        printf 'git:                 '
        if command -v git >/dev/null 2>&1; then git --version; else echo 'missing'; fi
        printf 'gh:                  '
        if command -v gh >/dev/null 2>&1; then gh --version | head -n 1; else echo 'missing'; fi
        printf 'git user.name:       '
        git config --global user.name 2>/dev/null || echo 'not set'
        printf 'git user.email:      '
        git config --global user.email 2>/dev/null || echo 'not set'
        printf 'GitHub username:     '
        if [ -f '{{.CONFIG_ENV_FILE}}' ]; then
          awk -F= '$1 == "GITHUB_USERNAME" { sub(/^[^=]*=/, ""); print; found=1 } END { if (!found) print "not set" }' '{{.CONFIG_ENV_FILE}}'
        else
          echo 'not set'
        fi
        printf 'encrypted token:     '
        if [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then echo 'present'; else echo 'missing'; fi
        printf 'gh auth:             '
        if command -v gh >/dev/null 2>&1 && gh auth status --hostname '{{.GITHUB_HOST}}' >/dev/null 2>&1; then echo 'authenticated'; else echo 'not authenticated'; fi
        printf 'git credential:      '
        if git config --global --get-all credential.https://{{.GITHUB_HOST}}.helper 2>/dev/null | grep -Fq gh; then echo 'gh configured'; else echo 'not configured'; fi
