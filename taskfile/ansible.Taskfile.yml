# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# =============================================================================
# File: taskfile/ansible.Taskfile.yml
# Purpose:
#   Install and maintain the controlled Ansible runtime for homelab automation.
# Notes:
#   - OS packages are limited to stable control-node prerequisites.
#   - Ansible, Paramiko, and ansible-pylibssh are installed inside a dedicated
#     virtual environment under state/venv/ansible.
#   - Playbooks are always executed from that virtual environment.
# =============================================================================

version: '3'

silent: true

vars:
  ANSIBLE_CONFIG_FILE: '{{.ROOT_DIR}}/ansible.cfg'
  ANSIBLE_COLLECTION_REQUIREMENTS_FILE: '{{.ROOT_DIR}}/ansible/collections/requirements.yml'
  ANSIBLE_INVENTORY_FILE: '{{.ROOT_DIR}}/state/ansible/inventory.yml'
  ANSIBLE_VENV_DIR: '{{.ROOT_DIR}}/state/venv/ansible'
  ANSIBLE_BIN: '{{.ROOT_DIR}}/state/venv/ansible/bin/ansible'
  ANSIBLE_INVENTORY_BIN: '{{.ROOT_DIR}}/state/venv/ansible/bin/ansible-inventory'
  ANSIBLE_PLAYBOOK: '{{.ROOT_DIR}}/state/venv/ansible/bin/ansible-playbook'
  ANSIBLE_GALAXY: '{{.ROOT_DIR}}/state/venv/ansible/bin/ansible-galaxy'
  ANSIBLE_PYTHON: '{{.ROOT_DIR}}/state/venv/ansible/bin/python'

tasks:
  default:
    desc: Show available Ansible tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available Ansible tasks
    cmds:
      - task --taskfile '{{.TASKFILE}}' --list

  bootstrap:
    desc: Install Ansible and required Galaxy collections
    run: once
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Install Ansible and required Galaxy collections" "PEACH"
      - task: tools:install
      - task: collections:install

  tools:check:apt:
    internal: true
    desc: Ensure Debian or Ubuntu package tooling is available
    cmds:
      - |
        set -euo pipefail
        command -v apt-get >/dev/null 2>&1
        command -v dpkg >/dev/null 2>&1
        [ -r /etc/os-release ]
        os_id="$(. /etc/os-release && printf '%s' "$ID")"
        case "$os_id" in
          ubuntu|debian) ;;
          *) echo "Unsupported distribution: ${os_id}. Only Ubuntu and Debian are supported." >&2; exit 1 ;;
        esac

  tools:install:
    desc: Install Ansible and SSH Python backends in a controlled virtual environment
    deps: [tools:check:apt]
    cmds:
      - |
        # =============================================================================
        # Task: tools:install
        # Purpose:
        #   Install OS prerequisites, then create a dedicated Ansible Python virtual
        #   environment so Paramiko and ansible-pylibssh are not mixed with system Python.
        # =============================================================================
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ca-certificates \
          openssh-client \
          python3 \
          python3-pip \
          python3-venv \
          sshpass

        mkdir -p '{{.ROOT_DIR}}/state/venv'
        chmod 700 '{{.ROOT_DIR}}/state/venv'

        if [ ! -x '{{.ANSIBLE_PYTHON}}' ]; then
          python3 -m venv '{{.ANSIBLE_VENV_DIR}}'
        fi

        '{{.ANSIBLE_PYTHON}}' -m pip install --upgrade pip wheel
        '{{.ANSIBLE_PYTHON}}' -m pip install --upgrade \
          ansible \
          ansible-pylibssh \
          paramiko
      - task: tools:check

  tools:check:
    desc: Validate Ansible virtual environment tooling
    cmds:
      - |
        set -euo pipefail
        missing=0
        for tool in ssh ssh-copy-id ssh-keyscan sshpass python3; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "Missing required tool: $tool" >&2
            missing=1
          fi
        done

        for tool in '{{.ANSIBLE_PLAYBOOK}}' '{{.ANSIBLE_GALAXY}}' '{{.ANSIBLE_PYTHON}}'; do
          if [ ! -x "$tool" ]; then
            echo "Missing Ansible virtualenv executable: $tool" >&2
            missing=1
          fi
        done

        if [ -x '{{.ANSIBLE_PYTHON}}' ] && ! '{{.ANSIBLE_PYTHON}}' - <<'PYTHON_CHECK'
        import importlib.metadata
        import importlib.util
        import sys

        for module in ("ansible", "paramiko"):
            if importlib.util.find_spec(module) is None:
                print(f"Missing required Python module in Ansible virtualenv: {module}", file=sys.stderr)
                sys.exit(1)

        try:
            importlib.metadata.version("ansible-pylibssh")
        except importlib.metadata.PackageNotFoundError:
            print("Missing required Python package in Ansible virtualenv: ansible-pylibssh", file=sys.stderr)
            sys.exit(1)
        PYTHON_CHECK
        then
          missing=1
        fi
        [ "$missing" -eq 0 ]
        echo 'Ansible virtualenv tooling check completed successfully.'

  collections:install:
    desc: Install Ansible Galaxy collection requirements
    deps: [tools:check]
    cmds:
      - |
        # =============================================================================
        # Task: collections:install
        # Purpose:
        #   Install Galaxy collections required by homelab playbooks.
        # =============================================================================
        set -euo pipefail
        ANSIBLE_CONFIG='{{.ANSIBLE_CONFIG_FILE}}' \
          '{{.ANSIBLE_GALAXY}}' collection install \
            -r '{{.ANSIBLE_COLLECTION_REQUIREMENTS_FILE}}' \
            -p '{{.ROOT_DIR}}/ansible/collections'

  inventory:render:
    desc: Generate state/ansible/inventory.yml from state/config/.env values
    deps: [tools:check]
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Generate state/ansible/inventory.yml from state/config/.env values" "PEACH"  
      - |
        # =============================================================================
        # Task: inventory:render
        # Purpose:
        #   Generate the runtime Ansible inventory using an Ansible localhost playbook.
        # =============================================================================
        set -euo pipefail
        mkdir -p '{{.ROOT_DIR}}/state/ansible'
        chmod 700 '{{.ROOT_DIR}}/state/ansible'
        ROOT_DIR='{{.ROOT_DIR}}' \
        STATE_DIR='{{.ROOT_DIR}}/state' \
        CONFIG_ENV_FILE='{{.CONFIG_ENV_FILE}}' \
        ANSIBLE_INVENTORY_FILE='{{.ANSIBLE_INVENTORY_FILE}}' \
        SSH_KEY_PATH='{{.SSH_KEY_PATH}}' \
          '{{.ROOT_DIR}}/scripts/lib/render-ansible-inventory.py'

  inventory:show:
    desc: Show the generated Ansible inventory
    cmds:
      - |
        set -euo pipefail
        if [ ! -f '{{.ANSIBLE_INVENTORY_FILE}}' ]; then
          echo 'Inventory has not been generated yet. Run task ansible:inventory:render first.' >&2
          exit 1
        fi
        cat '{{.ANSIBLE_INVENTORY_FILE}}'

  ssh-access:manage:
    desc: Run access governance for inventory hosts, including Linux SSH/users/sudo/audit and router reachability
    deps: [tools:check]
    cmds:
      - |
        # =============================================================================
        # Task: ssh-access:manage
        # Purpose:
        #   Process inventory hosts one at a time. For each host, print the
        #   server name, address, user, connection type, result, and next action.
        #   Linux hosts are governed for users, SSH, sudo, and audit. Network
        #   devices are connectivity-tested and summarised.
        # =============================================================================
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
        ANSIBLE_CONFIG_FILE='{{.ANSIBLE_CONFIG_FILE}}' \
        ANSIBLE_INVENTORY_FILE='{{.ANSIBLE_INVENTORY_FILE}}' \
        ANSIBLE_BIN='{{.ANSIBLE_BIN}}' \
        ANSIBLE_INVENTORY_BIN='{{.ANSIBLE_INVENTORY_BIN}}' \
        ANSIBLE_PLAYBOOK='{{.ANSIBLE_PLAYBOOK}}' \
        ANSIBLE_PYTHON='{{.ANSIBLE_PYTHON}}' \
        SSH_KEY_PATH='{{.SSH_KEY_PATH}}' \
        SSH_KNOWN_HOSTS_FILE='{{.SSH_KNOWN_HOSTS_FILE}}' \
          '{{.ROOT_DIR}}/scripts/lib/manage-linux-ssh-access.sh'

  ssh-access:bootstrap-password:
    desc: Alias for ssh-access:manage; prompts per Linux host only when password bootstrap is needed
    deps: [tools:check]
    cmds:
      - task: ssh-access:manage

  ssh-access:check:
    desc: Check access governance per host without applying Linux changes or prompting for passwords
    deps: [tools:check]
    cmds:
      - |
        # =============================================================================
        # Task: ssh-access:check
        # Purpose:
        #   Preview access governance per host. Linux hosts without key access are
        #   reported clearly and skipped because check mode does not prompt.
        #   Network devices are still tested for reachability.
        # =============================================================================
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
        ANSIBLE_CONFIG_FILE='{{.ANSIBLE_CONFIG_FILE}}' \
        ANSIBLE_INVENTORY_FILE='{{.ANSIBLE_INVENTORY_FILE}}' \
        ANSIBLE_BIN='{{.ANSIBLE_BIN}}' \
        ANSIBLE_INVENTORY_BIN='{{.ANSIBLE_INVENTORY_BIN}}' \
        ANSIBLE_PLAYBOOK='{{.ANSIBLE_PLAYBOOK}}' \
        ANSIBLE_PYTHON='{{.ANSIBLE_PYTHON}}' \
        SSH_KEY_PATH='{{.SSH_KEY_PATH}}' \
        SSH_KNOWN_HOSTS_FILE='{{.SSH_KNOWN_HOSTS_FILE}}' \
        ANSIBLE_SSH_ACCESS_CHECK_MODE='true' \
          '{{.ROOT_DIR}}/scripts/lib/manage-linux-ssh-access.sh'

  network-mounts:manage:
    desc: Mount configured network shares on Linux VMs and LXCs, host by host
    deps: [tools:check]
    cmds:
      - |
        # =============================================================================
        # Task: network-mounts:manage
        # Purpose:
        #   Process inventory hosts one at a time. Linux hosts are checked for SSH
        #   key access, then configured with the network mounts role. Routers and
        #   other network devices are reported as skipped.
        # =============================================================================
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
        ANSIBLE_CONFIG_FILE='{{.ANSIBLE_CONFIG_FILE}}' \
        ANSIBLE_INVENTORY_FILE='{{.ANSIBLE_INVENTORY_FILE}}' \
        ANSIBLE_BIN='{{.ANSIBLE_BIN}}' \
        ANSIBLE_INVENTORY_BIN='{{.ANSIBLE_INVENTORY_BIN}}' \
        ANSIBLE_PLAYBOOK='{{.ANSIBLE_PLAYBOOK}}' \
        ANSIBLE_PYTHON='{{.ANSIBLE_PYTHON}}' \
        SSH_KEY_PATH='{{.SSH_KEY_PATH}}' \
        SSH_KNOWN_HOSTS_FILE='{{.SSH_KNOWN_HOSTS_FILE}}' \
          '{{.ROOT_DIR}}/scripts/lib/manage-network-mounts.sh'

  network-mounts:check:
    desc: Preview configured network shares on Linux VMs and LXCs, host by host
    deps: [tools:check]
    cmds:
      - |
        # =============================================================================
        # Task: network-mounts:check
        # Purpose:
        #   Run network mount management in Ansible check mode where possible.
        # =============================================================================
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
        ANSIBLE_CONFIG_FILE='{{.ANSIBLE_CONFIG_FILE}}' \
        ANSIBLE_INVENTORY_FILE='{{.ANSIBLE_INVENTORY_FILE}}' \
        ANSIBLE_BIN='{{.ANSIBLE_BIN}}' \
        ANSIBLE_INVENTORY_BIN='{{.ANSIBLE_INVENTORY_BIN}}' \
        ANSIBLE_PLAYBOOK='{{.ANSIBLE_PLAYBOOK}}' \
        ANSIBLE_PYTHON='{{.ANSIBLE_PYTHON}}' \
        SSH_KEY_PATH='{{.SSH_KEY_PATH}}' \
        SSH_KNOWN_HOSTS_FILE='{{.SSH_KNOWN_HOSTS_FILE}}' \
        ANSIBLE_NETWORK_MOUNTS_CHECK_MODE='true' \
          '{{.ROOT_DIR}}/scripts/lib/manage-network-mounts.sh'
