# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# =============================================================================
# File: taskfile/mikrotik.Taskfile.yml
# Purpose:
#   Lightweight MikroTik RouterOS operator entrypoints for Ansible playbooks.
# Notes:
#   - Taskfile manages local convenience actions only: config prompts, SSH trust,
#     ssh-copy-id, and playbook invocation.
#   - Router configuration logic lives in Ansible playbooks and roles.
#   - Runtime inventory is generated at state/ansible/inventory.yml.
# =============================================================================

version: '3'

silent: true

vars:
  ANSIBLE_CONFIG_FILE: '{{.ROOT_DIR}}/ansible.cfg'
  ANSIBLE_INVENTORY_FILE: '{{.STATE_DIR}}/ansible/inventory.yml'
  MIKROTIK_OUTPUT_ROOT: '{{.STATE_DIR}}/mikrotik/generated'
  MIKROTIK_BACKUP_ROOT: '{{.STATE_DIR}}/mikrotik'
  MIKROTIK_DEFAULT_NAME: '{{default "hap-ax2" .MIKROTIK_NAME}}'
  MIKROTIK_DEFAULT_PORT: '{{default "22" .MIKROTIK_PORT}}'
  MIKROTIK_DEFAULT_USER: '{{default "admin" .MIKROTIK_USER}}'
  MIKROTIK_HOST_KEY_CHECKING: '{{default "false" .MIKROTIK_HOST_KEY_CHECKING}}'

tasks:
  default:
    desc: Show available MikroTik tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available MikroTik tasks
    cmds:
      - task --taskfile '{{.TASKFILE}}' --list

  bootstrap:
    desc: Prepare Ansible dependencies, MikroTik connection values, SSH access, and inventory
    run: once
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Prepare Ansible dependencies, MikroTik connection values, SSH access, and inventory" "PEACH"    
      - task: :ansible:bootstrap
      - task: connection:ensure
      - task: secrets:ensure
      - task: ssh-copy-id
      - task: :ansible:inventory:render

  connection:ensure:
    desc: Ensure MikroTik connection values exist in state/config/.env
    run: once
    cmds:
      - |
        # =============================================================================
        # Task: connection:ensure
        # Purpose:
        #   Resolve and persist standard MikroTik connection values for inventory.
        # =============================================================================
        set -euo pipefail
        mkdir -p '{{.CONFIG_DIR}}' '{{.TMP_DIR}}'
        chmod 700 '{{.CONFIG_DIR}}' '{{.TMP_DIR}}'
        touch '{{.CONFIG_ENV_FILE}}'
        chmod 600 '{{.CONFIG_ENV_FILE}}'

        get_env_value() {
          env_key="$1"
          if [ -f '{{.CONFIG_ENV_FILE}}' ]; then
            awk -F= -v key="$env_key" '$1 == key { sub(/^[^=]*=/, ""); print; exit }' '{{.CONFIG_ENV_FILE}}'
          fi
        }

        upsert_env_value() {
          env_key="$1"
          env_value="$2"
          temp_file="$(mktemp '{{.TMP_DIR}}/mikrotik-env.XXXXXX')"
          if [ -f '{{.CONFIG_ENV_FILE}}' ]; then
            awk -F= -v key="$env_key" '$1 != key' '{{.CONFIG_ENV_FILE}}' > "$temp_file"
          fi
          printf '%s=%s\n' "$env_key" "$env_value" >> "$temp_file"
          mv "$temp_file" '{{.CONFIG_ENV_FILE}}'
          chmod 600 '{{.CONFIG_ENV_FILE}}'
        }

        prompt_value() {
          prompt_text="$1"
          default_value="$2"
          if [ -n "$default_value" ]; then
            printf '%s' "$default_value"
            return 0
          fi
          if [ '{{.NONINTERACTIVE}}' = '1' ]; then
            printf '%s' "$default_value"
            return 0
          fi
          printf '%s' "$prompt_text" > /dev/tty
          IFS= read -r value < /dev/tty
          printf '%s' "$value"
        }

        mikrotik_name="${MIKROTIK_NAME:-$(get_env_value MIKROTIK_NAME)}"
        mikrotik_host="${MIKROTIK_HOST:-$(get_env_value MIKROTIK_HOST)}"
        mikrotik_user="${MIKROTIK_USER:-$(get_env_value MIKROTIK_USER)}"
        mikrotik_port="${MIKROTIK_PORT:-$(get_env_value MIKROTIK_PORT)}"
        mikrotik_command_timeout="${MIKROTIK_COMMAND_TIMEOUT:-$(get_env_value MIKROTIK_COMMAND_TIMEOUT)}"
        mikrotik_host_key_checking="${MIKROTIK_HOST_KEY_CHECKING:-$(get_env_value MIKROTIK_HOST_KEY_CHECKING)}"

        mikrotik_name="${mikrotik_name:-{{.MIKROTIK_DEFAULT_NAME}}}"
        mikrotik_user="${mikrotik_user:-{{.MIKROTIK_DEFAULT_USER}}}"
        mikrotik_port="${mikrotik_port:-{{.MIKROTIK_DEFAULT_PORT}}}"
        mikrotik_command_timeout="${mikrotik_command_timeout:-120}"
        mikrotik_host_key_checking="${mikrotik_host_key_checking:-{{.MIKROTIK_HOST_KEY_CHECKING}}}"
        mikrotik_host="$(prompt_value 'MikroTik SSH host or IP address: ' "$mikrotik_host")"

        [ -n "$mikrotik_host" ] || { echo 'MIKROTIK_HOST is required.' >&2; exit 1; }

        upsert_env_value MIKROTIK_NAME "$mikrotik_name"
        upsert_env_value MIKROTIK_HOST "$mikrotik_host"
        upsert_env_value MIKROTIK_USER "$mikrotik_user"
        upsert_env_value MIKROTIK_PORT "$mikrotik_port"
        upsert_env_value MIKROTIK_COMMAND_TIMEOUT "$mikrotik_command_timeout"
        upsert_env_value MIKROTIK_HOST_KEY_CHECKING "$mikrotik_host_key_checking"

        echo "MikroTik connection configured for ${mikrotik_user}@${mikrotik_host}:${mikrotik_port}."

  secrets:ensure:
    desc: Prompt for required MikroTik secrets and store them in the encrypted passwords file
    run: once
    deps:
      - :secrets_age:prepare
    cmds:
      - |
        # =============================================================================
        # Task: secrets:ensure
        # Purpose:
        #   Ensure required MikroTik runtime secrets are present in the encrypted
        #   passwords dotenv file before render, plan, backup, or apply steps run.
        # =============================================================================
        set -euo pipefail
        mkdir -p '{{.TMP_DIR}}'
        chmod 700 '{{.TMP_DIR}}'

        temp_plain="$(mktemp '{{.TMP_DIR}}/mikrotik-passwords.XXXXXX.env')"
        temp_next="$(mktemp '{{.TMP_DIR}}/mikrotik-passwords-next.XXXXXX.env')"
        trap 'rm -f "$temp_plain" "$temp_next"' EXIT

        if [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > "$temp_plain"
        else
          install -m 600 /dev/null "$temp_plain"
        fi

        get_secret_value() {
          secret_key="$1"
          awk -F= -v key="$secret_key" '$1 == key { sub(/^[^=]*=/, ""); print; exit }' "$temp_plain"
        }

        upsert_secret_value() {
          secret_key="$1"
          secret_value="$2"
          awk -F= -v key="$secret_key" '$1 != key' "$temp_plain" > "$temp_next"
          printf '%s=%s\n' "$secret_key" "$secret_value" >> "$temp_next"
          mv "$temp_next" "$temp_plain"
          chmod 600 "$temp_plain"
        }

        prompt_secret_value() {
          secret_key="$1"
          prompt_text="$2"
          current_value="$(get_secret_value "$secret_key")"
          if [ -n "$current_value" ] && [ "$current_value" != 'replace-me' ] && [ "$current_value" != 'CHANGE_ME' ]; then
            return 0
          fi
          env_value="$(eval "printf '%s' \"\${${secret_key}:-}\"")"
          if [ -n "$env_value" ]; then
            upsert_secret_value "$secret_key" "$env_value"
            return 0
          fi
          if [ '{{.NONINTERACTIVE}}' = '1' ]; then
            echo "Required MikroTik secret is missing: $secret_key" >&2
            exit 1
          fi
          printf '%s' "$prompt_text" > /dev/tty
          stty -echo < /dev/tty
          IFS= read -r secret_value < /dev/tty
          stty echo < /dev/tty
          printf '\n' > /dev/tty
          [ -n "$secret_value" ] || { echo "Required MikroTik secret is empty: $secret_key" >&2; exit 1; }
          upsert_secret_value "$secret_key" "$secret_value"
        }

        prompt_secret_value MIKROTIK_ROUTER_ADMIN_PASSWORD 'MikroTik router admin password: '
        prompt_secret_value MIKROTIK_WIFI_PASSPHRASE_USERS 'MikroTik USERS Wi-Fi passphrase: '
        prompt_secret_value MIKROTIK_WIFI_PASSPHRASE_MGMT 'MikroTik MGMT Wi-Fi passphrase: '
        prompt_secret_value MIKROTIK_WIFI_PASSPHRASE_IOT 'MikroTik IOT Wi-Fi passphrase: '
        prompt_secret_value MIKROTIK_WIFI_PASSPHRASE_GUEST 'MikroTik GUEST Wi-Fi passphrase: '

        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/passwords/passwords.enc.env' --input-type dotenv --output-type dotenv "$temp_plain" > '{{.PASSWORDS_ENC_ENV_FILE}}'
        chmod 600 '{{.PASSWORDS_ENC_ENV_FILE}}'
        echo 'MikroTik secrets are present in the encrypted passwords file.'

  ssh-copy-id:
    desc: Add the local SSH public key to configured MikroTik router hosts if needed
    run: once
    deps:
      - :ssh:generate
      - :ansible:tools:check
    cmds:
      - |
        # =============================================================================
        # Task: ssh-copy-id
        # Purpose:
        #   Ensure key-based SSH access to MikroTik hosts used by Ansible.
        # =============================================================================
        set -euo pipefail

        runtime_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime.XXXXXX.env')"
        runtime_shell_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime-shell.XXXXXX.env')"
        trap 'rm -f "$runtime_env" "$runtime_shell_env"' EXIT
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > "$runtime_env"
        python3 '{{.ROOT_DIR}}/scripts/lib/dotenv-to-shell-exports.py' "$runtime_env" "$runtime_shell_env"
        . "$runtime_shell_env"

        get_env_value() {
          env_key="$1"
          if [ -f '{{.CONFIG_ENV_FILE}}' ]; then
            awk -F= -v key="$env_key" '$1 == key { sub(/^[^=]*=/, ""); print; exit }' '{{.CONFIG_ENV_FILE}}'
          fi
        }

        normalise_router_key() {
          printf '%s' "$1" | tr '[:lower:]' '[:upper:]' | sed -E 's/[^A-Z0-9]+/_/g; s/^_+//; s/_+$//'
        }

        router_targets="${MIKROTIK_ROUTERS:-$(get_env_value MIKROTIK_ROUTERS)}"
        if [ -z "$router_targets" ]; then
          router_targets="${MIKROTIK_NAME:-$(get_env_value MIKROTIK_NAME)}"
        fi
        router_targets="${router_targets:-{{.MIKROTIK_DEFAULT_NAME}}}"

        default_host="${MIKROTIK_HOST:-$(get_env_value MIKROTIK_HOST)}"
        default_user="${MIKROTIK_USER:-$(get_env_value MIKROTIK_USER)}"
        default_port="${MIKROTIK_PORT:-$(get_env_value MIKROTIK_PORT)}"
        default_timeout="${MIKROTIK_COMMAND_TIMEOUT:-$(get_env_value MIKROTIK_COMMAND_TIMEOUT)}"
        default_user="${default_user:-{{.MIKROTIK_DEFAULT_USER}}}"
        default_port="${default_port:-{{.MIKROTIK_DEFAULT_PORT}}}"
        default_timeout="${default_timeout:-10}"

        [ -f '{{.SSH_KEY_PATH}}.pub' ] || { echo 'Public key not found. Run task ssh:generate first.' >&2; exit 1; }

        printf '%s' "$router_targets" | tr ',' '\n' | sed -E 's/^ +//; s/ +$//; /^$/d' | while IFS= read -r router_name; do
          router_key="$(normalise_router_key "$router_name")"
          eval scoped_host="\${MIKROTIK_${router_key}_HOST:-}"
          eval scoped_user="\${MIKROTIK_${router_key}_USER:-}"
          eval scoped_port="\${MIKROTIK_${router_key}_PORT:-}"

          host="${scoped_host:-$(get_env_value MIKROTIK_${router_key}_HOST)}"
          user="${scoped_user:-$(get_env_value MIKROTIK_${router_key}_USER)}"
          port="${scoped_port:-$(get_env_value MIKROTIK_${router_key}_PORT)}"
          host="${host:-$default_host}"
          user="${user:-$default_user}"
          port="${port:-$default_port}"

          [ -n "$host" ] || { echo "No host configured for ${router_name}. Set MIKROTIK_HOST or MIKROTIK_${router_key}_HOST." >&2; exit 1; }

          known_hosts_target="$host"
          if [ "$port" != '22' ]; then
            known_hosts_target="[$host]:$port"
          fi

          if ! ssh-keygen -F "$known_hosts_target" -f '{{.SSH_KNOWN_HOSTS_FILE}}' >/dev/null 2>&1; then
            echo "Trusting MikroTik SSH host key for ${known_hosts_target}."
            ssh-keyscan -T "$default_timeout" -p "$port" "$host" >> '{{.SSH_KNOWN_HOSTS_FILE}}' 2>/dev/null
            chmod 600 '{{.SSH_KNOWN_HOSTS_FILE}}'
          fi

          if ssh \
            -i '{{.SSH_KEY_PATH}}' \
            -p "$port" \
            -o BatchMode=yes \
            -o ConnectTimeout="$default_timeout" \
            -o StrictHostKeyChecking=yes \
            "$user@$host" ':put "ok"' >/dev/null 2>&1; then
            echo "SSH key already works for ${router_name} (${user}@${host}:${port})."
            continue
          fi

          echo "Installing SSH key for ${router_name} (${user}@${host}:${port})."
          if [ -n "${MIKROTIK_ROUTER_ADMIN_PASSWORD:-}" ]; then
            command -v sshpass >/dev/null 2>&1 || { echo 'sshpass is required to install the MikroTik SSH key with a password. Run task ansible:tools:install.' >&2; exit 1; }
            sshpass -p "$MIKROTIK_ROUTER_ADMIN_PASSWORD" ssh-copy-id \
              -i '{{.SSH_KEY_PATH}}.pub' \
              -p "$port" \
              -o ConnectTimeout="$default_timeout" \
              -o StrictHostKeyChecking=yes \
              "$user@$host"
          else
            ssh-copy-id \
              -i '{{.SSH_KEY_PATH}}.pub' \
              -p "$port" \
              -o ConnectTimeout="$default_timeout" \
              -o StrictHostKeyChecking=yes \
              "$user@$host"
          fi
        done

  backup:
    desc: Back up MikroTik RouterOS configuration using Ansible
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Back up MikroTik RouterOS configuration using Ansible" "PEACH"
      - task: :ansible:inventory:render
      - task: backup:run

  backup:run:
    internal: true
    desc: Run MikroTik backup without regenerating inventory
    deps: [secrets:ensure]
    cmds:
      - |
        # =============================================================================
        # Task: backup:run
        # Purpose:
        #   Run the backup playbook using the existing generated inventory.
        # =============================================================================
        set -euo pipefail
        runtime_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime.XXXXXX.env')"
        runtime_shell_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime-shell.XXXXXX.env')"
        trap 'rm -f "$runtime_env" "$runtime_shell_env"' EXIT
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > "$runtime_env"
        python3 '{{.ROOT_DIR}}/scripts/lib/dotenv-to-shell-exports.py' "$runtime_env" "$runtime_shell_env"
        . "$runtime_shell_env"
        backup_stamp="$(date +%Y%m%d-%H%M)"
        mkdir -p '{{.MIKROTIK_BACKUP_ROOT}}'
        chmod 700 '{{.MIKROTIK_BACKUP_ROOT}}'
        ANSIBLE_CONFIG='{{.ANSIBLE_CONFIG_FILE}}' \
        ANSIBLE_HOST_KEY_CHECKING='{{.MIKROTIK_HOST_KEY_CHECKING}}' \
        MIKROTIK_BACKUP_ROOT='{{.MIKROTIK_BACKUP_ROOT}}' \
        MIKROTIK_BACKUP_STAMP="$backup_stamp" \
          ansible-playbook \
            -i '{{.ANSIBLE_INVENTORY_FILE}}' \
            '{{.ROOT_DIR}}/ansible/playbooks/mikrotik_backup.yml'

  render:
    desc: Render the desired MikroTik RouterOS configuration only
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Render the desired MikroTik RouterOS configuration only" "PEACH"
      - task: :ansible:inventory:render
      - task: render:run

  render:run:
    internal: true
    desc: Render MikroTik desired state without regenerating inventory
    deps: [secrets:ensure]
    cmds:
      - |
        # =============================================================================
        # Task: render:run
        # Purpose:
        #   Render desired RouterOS configuration using the existing generated inventory.
        # =============================================================================
        set -euo pipefail
        runtime_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime.XXXXXX.env')"
        runtime_shell_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime-shell.XXXXXX.env')"
        trap 'rm -f "$runtime_env" "$runtime_shell_env"' EXIT
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > "$runtime_env"
        python3 '{{.ROOT_DIR}}/scripts/lib/dotenv-to-shell-exports.py' "$runtime_env" "$runtime_shell_env"
        . "$runtime_shell_env"
        output_dir='{{.MIKROTIK_OUTPUT_ROOT}}/'"$(date +%Y%m%d-%H%M%S)"
        mkdir -p "$output_dir"
        chmod 700 "$output_dir"
        ANSIBLE_CONFIG='{{.ANSIBLE_CONFIG_FILE}}' \
        MIKROTIK_OUTPUT_DIR="$output_dir" \
          ansible-playbook \
            -i '{{.ANSIBLE_INVENTORY_FILE}}' \
            '{{.ROOT_DIR}}/ansible/playbooks/mikrotik_render.yml'

  plan:
    desc: Render and diff desired MikroTik RouterOS configuration against the live router
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Render and diff desired MikroTik RouterOS configuration against the live router" "PEACH"
      - task: :ansible:inventory:render
      - task: plan:run

  plan:run:
    internal: true
    desc: Run MikroTik plan without regenerating inventory
    deps: [secrets:ensure]
    cmds:
      - |
        # =============================================================================
        # Task: plan:run
        # Purpose:
        #   Render and diff desired RouterOS configuration using existing inventory.
        # =============================================================================
        set -euo pipefail
        runtime_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime.XXXXXX.env')"
        runtime_shell_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime-shell.XXXXXX.env')"
        trap 'rm -f "$runtime_env" "$runtime_shell_env"' EXIT
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > "$runtime_env"
        python3 '{{.ROOT_DIR}}/scripts/lib/dotenv-to-shell-exports.py' "$runtime_env" "$runtime_shell_env"
        . "$runtime_shell_env"
        output_dir='{{.MIKROTIK_OUTPUT_ROOT}}/'"$(date +%Y%m%d-%H%M%S)"
        mkdir -p "$output_dir"
        chmod 700 "$output_dir"
        ANSIBLE_CONFIG='{{.ANSIBLE_CONFIG_FILE}}' \
        ANSIBLE_HOST_KEY_CHECKING='{{.MIKROTIK_HOST_KEY_CHECKING}}' \
        MIKROTIK_OUTPUT_DIR="$output_dir" \
          ansible-playbook \
            -i '{{.ANSIBLE_INVENTORY_FILE}}' \
            '{{.ROOT_DIR}}/ansible/playbooks/mikrotik_plan.yml'

  apply:
    desc: Render, diff, confirm, and apply desired MikroTik RouterOS configuration
    cmds:
      - task: :ansible:inventory:render
      - task: apply:run

  apply:run:
    internal: true
    desc: Apply MikroTik desired state without regenerating inventory
    deps: [secrets:ensure]
    cmds:
      - |
        # =============================================================================
        # Task: apply:run
        # Purpose:
        #   Apply desired RouterOS configuration using existing inventory.
        # =============================================================================
        set -euo pipefail
        runtime_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime.XXXXXX.env')"
        runtime_shell_env="$(mktemp '{{.TMP_DIR}}/mikrotik-runtime-shell.XXXXXX.env')"
        trap 'rm -f "$runtime_env" "$runtime_shell_env"' EXIT
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > "$runtime_env"
        python3 '{{.ROOT_DIR}}/scripts/lib/dotenv-to-shell-exports.py' "$runtime_env" "$runtime_shell_env"
        . "$runtime_shell_env"
        output_dir='{{.MIKROTIK_OUTPUT_ROOT}}/'"$(date +%Y%m%d-%H%M%S)"
        mkdir -p "$output_dir"
        chmod 700 "$output_dir"
        ANSIBLE_CONFIG='{{.ANSIBLE_CONFIG_FILE}}' \
        ANSIBLE_HOST_KEY_CHECKING='{{.MIKROTIK_HOST_KEY_CHECKING}}' \
        MIKROTIK_OUTPUT_DIR="$output_dir" \
          ansible-playbook \
            -i '{{.ANSIBLE_INVENTORY_FILE}}' \
            '{{.ROOT_DIR}}/ansible/playbooks/mikrotik_apply.yml'
