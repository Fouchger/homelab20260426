# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# =============================================================================
# File: taskfile/secrets_sops_age.Taskfile.yml
# Purpose:
#   Manage repository-side encrypted secrets using age and SOPS.
#
# Notes:
#   - Run this workflow before the OpenBao workflow.
#   - Private age identities remain local under state/secrets/age.
#   - Encrypted SOPS files are stored under state/secrets.
# =============================================================================

version: '3'

silent: true

vars:
  AGE_ARCHIVE_DIR: '{{.AGE_DIR}}/archive'
  AGE_ADMIN_KEY: '{{.AGE_DIR}}/admin.key'
  AGE_ADMIN_PUB: '{{.AGE_DIR}}/admin.pub'
  AGE_RECOVERY_KEY: '{{.AGE_DIR}}/recovery.key'
  AGE_RECOVERY_PUB: '{{.AGE_DIR}}/recovery.pub'
  SOPS_SAMPLE_FILE: '{{.SECRETS_DIR}}/sops/examples/bootstrap.enc.yaml'

tasks:
  default:
    desc: Show available SOPS and age tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available SOPS and age tasks
    cmds:
      - task --taskfile '{{.TASKFILE}}' --list

  prepare:
    desc: Prepare age identities, SOPS config, and baseline encrypted files
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/scripts/lib/terminal-colours.sh"
        print_section_header "Prepare age identities, SOPS config, and baseline encrypted files" "PEACH"    
      - task: init
      - task: tools:install
      - task: age:generate
      - task: sops:config:render
      - task: passwords:sample:create
      - task: sops:sample:create
      - task: editor:select
      - task: report

  init:
    internal: true
    desc: Create standard SOPS and age directories
    cmds:
      - |
        # =============================================================================
        # Task: init
        # Purpose:
        #   Create repository-side state directories for encrypted secrets.
        # =============================================================================
        set -euo pipefail
        mkdir -p \
          '{{.SECRETS_DIR}}' \
          '{{.TMP_DIR}}' \
          '{{.BACKUP_DIR}}' \
          '{{.AGE_DIR}}' \
          '{{.AGE_ARCHIVE_DIR}}' \
          '{{.PASSWORDS_DIR}}' \
          '{{.SECRETS_DIR}}/sops/examples'
        chmod 700 \
          '{{.SECRETS_DIR}}' \
          '{{.TMP_DIR}}' \
          '{{.BACKUP_DIR}}' \
          '{{.AGE_DIR}}' \
          '{{.AGE_ARCHIVE_DIR}}' \
          '{{.PASSWORDS_DIR}}'

  tools:check:apt:
    internal: true
    desc: Ensure Debian or Ubuntu package tooling is available
    cmds:
      - |
        set -euo pipefail
        command -v apt-get >/dev/null 2>&1
        command -v dpkg >/dev/null 2>&1
        os_id="$(. /etc/os-release && printf '%s' "$ID")"
        case "$os_id" in
          ubuntu|debian) ;;
          *) echo "Unsupported distribution: ${os_id}. Only Ubuntu and Debian are supported." >&2; exit 1 ;;
        esac

  tools:install:
    internal: true
    desc: Install age, SOPS, and supporting tools
    deps: [tools:check:apt]
    cmds:
      - |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends age jq curl openssl sed gawk ca-certificates gnupg tar python3 python3-yaml
        if ! command -v sops >/dev/null 2>&1; then
          arch="$(dpkg --print-architecture)"
          version="$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/getsops/sops/releases/latest | sed 's#.*/tag/##; s#^v##')"
          package_file="sops_${version}_${arch}.deb"
          package_url="https://github.com/getsops/sops/releases/download/v${version}/${package_file}"
          temp_package="$(mktemp -p /var/tmp sops.XXXXXX.deb)"
          trap 'rm -f "$temp_package"' EXIT
          curl -fL "$package_url" -o "$temp_package"
          sudo apt-get install -y "$temp_package"
        fi
      - task: tools:check

  tools:check:
    desc: Validate required SOPS and age tooling
    cmds:
      - |
        set -euo pipefail
        missing=0
        for tool in age-keygen age sops jq curl openssl sed awk tar python3; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "Missing required tool: $tool" >&2
            missing=1
          fi
        done
        [ "$missing" -eq 0 ]
        echo 'SOPS and age tooling check completed successfully.'

  age:generate:
    desc: Generate standard admin and recovery age identities if missing
    deps: [init]
    cmds:
      - |
        # =============================================================================
        # Task: age:generate
        # Purpose:
        #   Create the standard admin and recovery age identities.
        # =============================================================================
        set -euo pipefail
        if [ ! -f '{{.AGE_ADMIN_KEY}}' ]; then
          age-keygen -o '{{.AGE_ADMIN_KEY}}' >/dev/null
          age-keygen -y '{{.AGE_ADMIN_KEY}}' > '{{.AGE_ADMIN_PUB}}'
          chmod 600 '{{.AGE_ADMIN_KEY}}'
          chmod 644 '{{.AGE_ADMIN_PUB}}'
        fi
        if [ ! -f '{{.AGE_RECOVERY_KEY}}' ]; then
          age-keygen -o '{{.AGE_RECOVERY_KEY}}' >/dev/null
          age-keygen -y '{{.AGE_RECOVERY_KEY}}' > '{{.AGE_RECOVERY_PUB}}'
          chmod 600 '{{.AGE_RECOVERY_KEY}}'
          chmod 644 '{{.AGE_RECOVERY_PUB}}'
        fi
        cat '{{.AGE_ADMIN_KEY}}' '{{.AGE_RECOVERY_KEY}}' > '{{.AGE_KEYS_FILE}}'
        chmod 600 '{{.AGE_KEYS_FILE}}'
        echo "admin=$(cat '{{.AGE_ADMIN_PUB}}')"
        echo "recovery=$(cat '{{.AGE_RECOVERY_PUB}}')"

  sops:config:render:
    desc: Render the repository SOPS configuration
    deps: [age:generate]
    cmds:
      - |
        # =============================================================================
        # Task: sops:config:render
        # Purpose:
        #   Render .sops.yaml for files under state/secrets.
        # =============================================================================
        set -euo pipefail
        admin="$(cat '{{.AGE_ADMIN_PUB}}')"
        recovery="$(cat '{{.AGE_RECOVERY_PUB}}')"
        cat > '{{.SOPS_CONFIG_FILE}}' <<EOF2
        # =============================================================================
        # File: .sops.yaml
        # Purpose:
        #   SOPS creation rules for secrets stored under state/secrets.
        # =============================================================================
        creation_rules:
          - path_regex: ^(.*/)?state/secrets/.*\.(ya?ml|json|env|ini|txt|conf)$
            age: >-
              ${admin},${recovery}
        EOF2
        chmod 600 '{{.SOPS_CONFIG_FILE}}'

  passwords:sample:create:
    internal: true
    desc: Create the encrypted passwords file and a safe example file
    deps: [sops:config:render]
    cmds:
      - |
        set -euo pipefail
        if [ ! -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then
          temp_plain='{{.TMP_DIR}}/passwords.sample.env'
          trap 'rm -f "$temp_plain"' EXIT
          cat > "$temp_plain" <<'EOF2'
        # =============================================================================
        # File: passwords.sample.env
        # Purpose:
        #   Example managed passwords file for homelab workflows.
        # =============================================================================
        GITHUB_TOKEN=replace-me
        OPENBAO_ROOT_TOKEN=replace-me
        OPENBAO_TRANSIT_AUTOUNSEAL_TOKEN=replace-me
        EOF2
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/passwords/passwords.enc.env' --input-type dotenv --output-type dotenv "$temp_plain" > '{{.PASSWORDS_ENC_ENV_FILE}}'
          chmod 600 '{{.PASSWORDS_ENC_ENV_FILE}}'
        fi
        cat > '{{.PASSWORDS_EXAMPLE_ENV_FILE}}' <<'EOF2'
        # =============================================================================
        # File: passwords.example.env
        # Purpose:
        #   Safe example showing expected environment keys.
        # =============================================================================
        GITHUB_TOKEN=replace-me
        OPENBAO_ROOT_TOKEN=replace-me
        OPENBAO_TRANSIT_AUTOUNSEAL_TOKEN=replace-me
        EOF2
        chmod 644 '{{.PASSWORDS_EXAMPLE_ENV_FILE}}'

  sops:sample:create:
    internal: true
    desc: Create an example encrypted SOPS file if missing
    deps: [sops:config:render]
    cmds:
      - |
        set -euo pipefail
        if [ -f '{{.SOPS_SAMPLE_FILE}}' ]; then
          exit 0
        fi
        temp_plain='{{.TMP_DIR}}/bootstrap.yaml'
        trap 'rm -f "$temp_plain"' EXIT
        cat > "$temp_plain" <<EOF2
        # =============================================================================
        # File: bootstrap.yaml
        # Purpose:
        #   Example bootstrap secret payload for SOPS testing.
        # =============================================================================
        bootstrap:
          created_by: task
          created_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          note: replace-this-with-real-values
        EOF2
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override '{{.SOPS_SAMPLE_FILE}}' --input-type yaml --output-type yaml "$temp_plain" > '{{.SOPS_SAMPLE_FILE}}'
        chmod 600 '{{.SOPS_SAMPLE_FILE}}'

  secret:create:
    desc: Create a new secret entry in an encrypted file
    cmds:
      - task: secret:update
        vars:
          SECRET_GROUP: '{{.SECRET_GROUP}}'
          SECRET_KEY: '{{.SECRET_KEY}}'
          SECRET_VALUE: '{{.SECRET_VALUE}}'

  secret:update:
    desc: Add or update a secret in an encrypted file
    deps: [sops:config:render]
    preconditions:
      - sh: '[ -n "{{.SECRET_GROUP}}" ]'
        msg: 'Provide SECRET_GROUP=<group>'
      - sh: '[ -n "{{.SECRET_KEY}}" ]'
        msg: 'Provide SECRET_KEY=<key>'
      - sh: '[ -n "{{.SECRET_VALUE}}" ]'
        msg: 'Provide SECRET_VALUE=<value>'
    cmds:
      - |
        # =============================================================================
        # Task: secret:update
        # Purpose:
        #   Upsert a secret into the appropriate encrypted group file.
        # =============================================================================
        set -euo pipefail
        group='{{.SECRET_GROUP}}'
        key='{{.SECRET_KEY}}'
        value='{{.SECRET_VALUE}}'
        temp_plain='{{.TMP_DIR}}/secret-plain'
        trap 'rm -f "$temp_plain" "${temp_plain}.next"' EXIT
        if [ "$group" = 'passwords' ]; then
          target_file='{{.PASSWORDS_ENC_ENV_FILE}}'
          filename_override='state/secrets/passwords/passwords.enc.env'
          input_type='dotenv'
          output_type='dotenv'
          [ -f "$target_file" ] && SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt "$target_file" > "$temp_plain" || install -m 600 /dev/null "$temp_plain"
          if grep -Eq "^${key}=" "$temp_plain"; then
            awk -v secret_key="$key" -v secret_value="$value" 'BEGIN {FS=OFS="="} $1 == secret_key {$0 = secret_key "=" secret_value} {print}' "$temp_plain" > "${temp_plain}.next"
            mv "${temp_plain}.next" "$temp_plain"
          else
            printf '%s=%s\n' "$key" "$value" >> "$temp_plain"
          fi
        else
          target_dir='{{.SECRETS_DIR}}/'"$group"
          target_file="${target_dir}/${group}.enc.yaml"
          filename_override="state/secrets/${group}/${group}.enc.yaml"
          input_type='yaml'
          output_type='yaml'
          mkdir -p "$target_dir"
          [ -f "$target_file" ] && SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt "$target_file" > "$temp_plain" || printf '{}\n' > "$temp_plain"
          python3 - "$temp_plain" "$key" "$value" <<'PY'
        import sys
        from pathlib import Path
        import yaml
        plain_file = Path(sys.argv[1])
        data = yaml.safe_load(plain_file.read_text(encoding='utf-8')) or {}
        data[sys.argv[2]] = sys.argv[3]
        plain_file.write_text(yaml.safe_dump(data, sort_keys=True), encoding='utf-8')
        PY
        fi
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override "$filename_override" --input-type "$input_type" --output-type "$output_type" "$temp_plain" > "$target_file"
        chmod 600 "$target_file"

  secret:view:
    desc: View a specific secret from an encrypted file
    preconditions:
      - sh: '[ -n "{{.SECRET_GROUP}}" ]'
        msg: 'Provide SECRET_GROUP=<group>'
      - sh: '[ -n "{{.SECRET_KEY}}" ]'
        msg: 'Provide SECRET_KEY=<key>'
    cmds:
      - |
        set -euo pipefail
        group='{{.SECRET_GROUP}}'
        key='{{.SECRET_KEY}}'
        if [ "$group" = 'passwords' ]; then
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' | awk -F= -v wanted="$key" '$1 == wanted {print; found=1} END {exit(found ? 0 : 1)}'
        else
          target_file='{{.SECRETS_DIR}}/'"$group"'/'"$group"'.enc.yaml'
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt "$target_file" | awk -F': ' -v wanted="$key" '$1 == wanted {print; found=1} END {exit(found ? 0 : 1)}'
        fi

  view:group:
    desc: View all secrets in a specific group
    preconditions:
      - sh: '[ -n "{{.SECRET_GROUP}}" ]'
        msg: 'Provide SECRET_GROUP=<group>'
    cmds:
      - |
        set -euo pipefail
        group='{{.SECRET_GROUP}}'
        if [ "$group" = 'passwords' ]; then
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}'
        else
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.SECRETS_DIR}}/'"$group"'/'"$group"'.enc.yaml'
        fi

  view:all:
    desc: List all encrypted secret files by group
    cmds:
      - |
        set -euo pipefail
        echo '--- secret files ---'
        find '{{.SECRETS_DIR}}' -type f \( -name '*.enc.env' -o -name '*.enc.yaml' -o -name '*.enc.yml' -o -name '*.enc.json' \) | sort || true

  edit:
    desc: Edit an encrypted secrets file directly with SOPS
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: 'Provide FILE=state/secrets/...'
      - sh: '[ -f "{{.FILE}}" ]'
        msg: 'The requested encrypted file does not exist.'
    cmds:
      - |
        set -euo pipefail
        editor_value="$(awk -F= '$1 == "SECRETS_EDITOR" {print $2}' '{{.CONFIG_ENV_FILE}}' 2>/dev/null | sed "s/^'//; s/'$//" || true)"
        if [ -n "$editor_value" ]; then
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' SOPS_EDITOR="$editor_value" sops '{{.FILE}}'
        else
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops '{{.FILE}}'
        fi

  env:runtime:render:
    desc: Decrypt the managed passwords env into a local runtime-only plaintext file
    cmds:
      - |
        set -euo pipefail
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > '{{.PASSWORDS_RUNTIME_ENV_FILE}}'
        chmod 600 '{{.PASSWORDS_RUNTIME_ENV_FILE}}'

  env:runtime:clean:
    desc: Remove the local decrypted runtime passwords env
    cmds:
      - rm -f '{{.PASSWORDS_RUNTIME_ENV_FILE}}'

  backup:bundle:
    desc: Create a tar.gz backup bundle of age identities and encrypted secrets
    cmds:
      - |
        set -euo pipefail
        mkdir -p '{{.BACKUP_DIR}}'
        archive='{{.BACKUP_DIR}}/sops-age-'"$(date -u +%Y%m%dT%H%M%SZ)"'.tar.gz'
        tar -C '{{.ROOT_DIR}}' -czf "$archive" state/secrets .sops.yaml 2>/dev/null || tar -C '{{.ROOT_DIR}}' -czf "$archive" state/secrets
        chmod 600 "$archive"
        echo "Created $archive"

  ops:rotate:keys:
    desc: Rotate age identities and rekey SOPS-encrypted files
    deps: [backup:bundle]
    cmds:
      - |
        set -euo pipefail
        marker_file='{{.AGE_DIR}}/.rotation-in-progress'
        [ ! -f "$marker_file" ] || { echo "Rotation marker exists: $marker_file" >&2; exit 1; }
        touch "$marker_file"
        archive_dir='{{.AGE_ARCHIVE_DIR}}/'"$(date -u +%Y%m%dT%H%M%SZ)"
        mkdir -p "$archive_dir" '{{.TMP_DIR}}'
        cp '{{.AGE_ADMIN_KEY}}' '{{.AGE_ADMIN_PUB}}' '{{.AGE_RECOVERY_KEY}}' '{{.AGE_RECOVERY_PUB}}' '{{.AGE_KEYS_FILE}}' "$archive_dir/"
        old_keys='{{.TMP_DIR}}/age-old-keys.txt'
        new_admin_key='{{.TMP_DIR}}/admin.key.new'
        new_recovery_key='{{.TMP_DIR}}/recovery.key.new'
        trap 'rm -f "$old_keys" "$new_admin_key" "$new_admin_key.pub" "$new_recovery_key" "$new_recovery_key.pub" "$marker_file"' EXIT
        cp '{{.AGE_KEYS_FILE}}' "$old_keys"
        age-keygen -o "$new_admin_key" >/dev/null
        age-keygen -y "$new_admin_key" > "$new_admin_key.pub"
        age-keygen -o "$new_recovery_key" >/dev/null
        age-keygen -y "$new_recovery_key" > "$new_recovery_key.pub"
        cat "$new_admin_key" "$new_recovery_key" > '{{.AGE_KEYS_FILE}}.new'
        admin="$(cat "$new_admin_key.pub")"
        recovery="$(cat "$new_recovery_key.pub")"
        cat > '{{.SOPS_CONFIG_FILE}}' <<EOF2
        # =============================================================================
        # File: .sops.yaml
        # Purpose:
        #   SOPS creation rules for secrets stored under state/secrets.
        # =============================================================================
        creation_rules:
          - path_regex: ^(.*/)?state/secrets/.*\.(ya?ml|json|env|ini|txt|conf)$
            age: >-
              ${admin},${recovery}
        EOF2
        find '{{.SECRETS_DIR}}' -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.json' -o -name '*.env' -o -name '*.ini' -o -name '*.txt' -o -name '*.conf' \) | sort | while IFS= read -r file; do
          if grep -Eq '^[[:space:]]*sops:|"sops"[[:space:]]*:' "$file"; then
            SOPS_AGE_KEY_FILE="$old_keys" sops updatekeys -y "$file" >/dev/null
          fi
        done
        install -m 600 "$new_admin_key" '{{.AGE_ADMIN_KEY}}'
        install -m 644 "$new_admin_key.pub" '{{.AGE_ADMIN_PUB}}'
        install -m 600 "$new_recovery_key" '{{.AGE_RECOVERY_KEY}}'
        install -m 644 "$new_recovery_key.pub" '{{.AGE_RECOVERY_PUB}}'
        install -m 600 '{{.AGE_KEYS_FILE}}.new' '{{.AGE_KEYS_FILE}}'
        rm -f '{{.AGE_KEYS_FILE}}.new'
      - task: report

  editor:select:
    desc: Choose the editor used for secrets editing
    deps: [init]
    cmds:
      - |
        set -euo pipefail
        mkdir -p "$(dirname '{{.CONFIG_ENV_FILE}}')"
        if [ -f '{{.CONFIG_ENV_FILE}}' ] && grep -Eq '^SECRETS_EDITOR=' '{{.CONFIG_ENV_FILE}}'; then
          echo 'Secrets editor already configured.'
          exit 0
        fi
        if [ '{{.NONINTERACTIVE}}' = '1' ]; then
          selected_editor='nano'
        else
          printf 'Choose secrets editor [nano]: '
          read -r selected_editor
          selected_editor="${selected_editor:-nano}"
        fi
        printf 'SECRETS_EDITOR=%s\n' "$selected_editor" >> '{{.CONFIG_ENV_FILE}}'
        chmod 600 '{{.CONFIG_ENV_FILE}}'
        echo "Secrets editor set to: ${selected_editor}"

  clean:tmp:
    desc: Remove temporary plaintext working files
    cmds:
      - |
        set -euo pipefail
        mkdir -p '{{.TMP_DIR}}'
        find '{{.TMP_DIR}}' -mindepth 1 -maxdepth 1 -type f -exec rm -f {} +

  report:
    desc: Print a concise SOPS and age status report
    cmds:
      - |
        set -euo pipefail
        secret_count="$(find '{{.SECRETS_DIR}}' -type f \( -name '*.enc.env' -o -name '*.enc.yaml' -o -name '*.enc.yml' -o -name '*.enc.json' \) 2>/dev/null | wc -l | tr -d ' ')"
        echo '--- age ---'
        [ -f '{{.AGE_ADMIN_KEY}}' ] && echo 'admin key: present' || echo 'admin key: missing'
        [ -f '{{.AGE_RECOVERY_KEY}}' ] && echo 'recovery key: present' || echo 'recovery key: missing'
        echo '--- sops ---'
        [ -f '{{.SOPS_CONFIG_FILE}}' ] && echo '.sops.yaml: present' || echo '.sops.yaml: missing'
        echo '--- encrypted secret files ---'
        echo "count: $secret_count"
