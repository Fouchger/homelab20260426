# ==============================================================================
# File: Taskfile.yml
# Purpose:
#   Root Task entry point and control plane for the homelab repository.
# Notes:
#   - install.sh downloads or updates the repository only.
#   - Taskfile.yml is the operational entrypoint after installation.
#   - Shared variables are defined once here and reused by child Taskfiles.
# ==============================================================================


version: '3'

silent: true

dotenv:
  - state/config/.env

vars:
  # Repo-wide shared variables
  STATE_DIR: '{{default (printf "%s/state" .ROOT_DIR) .STATE_DIR}}'
  CONFIG_DIR: '{{default (printf "%s/config" .STATE_DIR) .CONFIG_DIR}}'
  SECRETS_DIR: '{{default (printf "%s/secrets" .STATE_DIR) .SECRETS_DIR}}'
  TMP_DIR: '{{default (printf "%s/tmp" .STATE_DIR) .TMP_DIR}}'
  BACKUP_DIR: '{{default (printf "%s/backups" .STATE_DIR) .BACKUP_DIR}}'
  CONFIG_ENV_FILE: '{{default (printf "%s/.env" .CONFIG_DIR) .CONFIG_ENV_FILE}}'
  AUDIT_DIR: '{{default (printf "%s/audit" .STATE_DIR) .AUDIT_DIR}}'
  DR_DIR: '{{default (printf "%s/dr" .STATE_DIR) .DR_DIR}}'
  AGE_DIR: '{{.SECRETS_DIR}}/age'
  AGE_KEYS_FILE: '{{.AGE_DIR}}/keys.txt'
  PASSWORDS_DIR: '{{.SECRETS_DIR}}/passwords'
  PASSWORDS_ENC_ENV_FILE: '{{.PASSWORDS_DIR}}/passwords.enc.env'
  PASSWORDS_EXAMPLE_ENV_FILE: '{{.PASSWORDS_DIR}}/passwords.example.env'
  PASSWORDS_RUNTIME_ENV_FILE: '{{.PASSWORDS_DIR}}/.runtime.env'
  SOPS_CONFIG_FILE: '{{.ROOT_DIR}}/.sops.yaml'

  # Shared SSH variables
  SSH_KEY_DIR: '{{default (printf "%s/.ssh" .HOME) .SSH_KEY_DIR}}'
  SSH_KEY_NAME: '{{default "homelab_ed25519" .SSH_KEY_NAME}}'
  SSH_KEY_PATH: '{{default (printf "%s/%s" .SSH_KEY_DIR .SSH_KEY_NAME) .SSH_KEY_PATH}}'
  SSH_KNOWN_HOSTS_FILE: '{{default (printf "%s/known_hosts" .SSH_KEY_DIR) .SSH_KNOWN_HOSTS_FILE}}'
  PROXMOX_SSH_HOST: '{{default "" .PROXMOX_SSH_HOST}}'
  PROXMOX_SSH_PORT: '{{default "22" .PROXMOX_SSH_PORT}}'
  PROXMOX_SSH_USER: '{{default "root" .PROXMOX_SSH_USER}}'
  SSH_CONNECT_TIMEOUT: '{{default "5" .SSH_CONNECT_TIMEOUT}}'
  NONINTERACTIVE: '{{default "0" .NONINTERACTIVE}}'

  # Shared Proxmox automation variables
  PVE_REALM: '{{default "pam" .PVE_REALM}}'
  PVE_AUTOMATION_USER: '{{default "automation" .PVE_AUTOMATION_USER}}'
  PVE_AUTOMATION_ROLE: '{{default "AutomationRole" .PVE_AUTOMATION_ROLE}}'
  PVE_AUTOMATION_TOKEN_ID: '{{default "automation-token" .PVE_AUTOMATION_TOKEN_ID}}'
  PVE_AUTOMATION_PRIVS: '{{default "Datastore.AllocateSpace,Datastore.AllocateTemplate,Datastore.Audit,VM.Allocate,VM.Audit,VM.Clone,VM.Console,VM.Config.CDROM,VM.Config.Cloudinit,VM.Config.CPU,VM.Config.Disk,VM.Config.HWType,VM.Config.Memory,VM.Config.Network,VM.Config.Options,VM.PowerMgmt" .PVE_AUTOMATION_PRIVS}}'
  PROXMOX_TEMPLATE_DATASTORE: '{{default "local" .PROXMOX_TEMPLATE_DATASTORE}}'
  PROXMOX_VM_DATASTORE: '{{default "local-lvm" .PROXMOX_VM_DATASTORE}}'
  PROXMOX_SNIPPETS_DATASTORE: '{{default "local" .PROXMOX_SNIPPETS_DATASTORE}}'
  PROXMOX_INSECURE_TLS: '{{default "true" .PROXMOX_INSECURE_TLS}}'



includes:
  ansible: ./taskfile/ansible.Taskfile.yml
  mikrotik: ./taskfile/mikrotik.Taskfile.yml
  git_github: ./taskfile/git_github.Taskfile.yml
  ssh: ./taskfile/ssh.Taskfile.yml
  proxmox: ./taskfile/proxmox.Taskfile.yml
  proxmox_scripts: ./taskfile/proxmox_scripts.Taskfile.yml
  secrets_age: ./taskfile/secrets_sops_age.Taskfile.yml
  secrets_openbao: ./taskfile/secrets_openbao.Taskfile.yml

tasks:
  default:
    desc: Show available homelab tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show the available secrets tasks
    cmds:
      - task --taskfile "{{.TASKFILE}}" --list

  homelab:setup:
    desc: Set up the complete homelab control plane, then back up and plan MikroTik changes
    cmds:
      - |
        bash ./scripts/lib/ensure-executable-scripts.sh
        clear
        ./scripts/banner/banner.sh
      - task: proxmox_scripts:code-server:install
      - task: secrets_age:prepare
      - task: git_github:bootstrap
      - task: secrets_openbao:prepare
      - task: ssh:bootstrap
      - task: proxmox:bootstrap
      - task: ansible:bootstrap
      - task: mikrotik:connection:ensure
      - task: mikrotik:secrets:ensure
      - task: ansible:inventory:render
      - task: mikrotik:ssh-copy-id
      - task: mikrotik:backup:run
      - task: mikrotik:plan:run


  

  test:
    desc: test   
    cmds:
      - |
        echo '{{.SECRETS_DIR}}'
